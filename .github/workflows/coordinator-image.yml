name: coordinator-image

# Build the v2 coordinator Docker image on GitHub's amd64 runners (native — no
# QEMU, no cross-compile) and publish it to GHCR. The droplets just `docker pull`
# it. Triggered on changes to the coordinator/renderer, or manually.
on:
  push:
    branches: [master]
    paths:
      - 'coordinator/**'
      - 'crates/**'
      - 'web/genomes/**'
      - '.github/workflows/coordinator-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: coordinator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sheep-coordinator:latest
            ghcr.io/${{ github.repository_owner }}/sheep-coordinator:${{ github.sha }}
