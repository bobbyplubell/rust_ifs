name: CI

# Determinism check for the renderer. The render goldens are the heart of it: if
# a code change alters render output without the goldens being regenerated, this
# fails — so a determinism regression can never land silently.
on:
  push:
    branches: [master]
  pull_request: {}

jobs:
  rust-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # golden_determinism + render_batch_is_deterministic_and_golden assert the
      # native render hashes against committed constants (chunked.rs).
      - name: cargo test (native render goldens)
        run: cargo test -p flame-core --lib
