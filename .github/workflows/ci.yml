name: CI

# Determinism + stack checks. The render goldens are the heart of it: if a code
# change alters render output without the goldens being regenerated, these fail
# — so a determinism regression can never land silently.
on:
  push:
    branches: [master]
  pull_request: {}

jobs:
  rust-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # golden_determinism + render_batch_is_deterministic_and_golden assert the
      # native render hashes against committed constants (chunked.rs).
      - name: cargo test (native render goldens)
        run: cargo test -p flame-core --lib

  browser-determinism:
    runs-on: ubuntu-latest
    # Playwright image ships the browsers. Drives web/determinism.html in real
    # Chromium and asserts every browser WASM chunk hash is byte-identical to the
    # native goldens (web/genomes/expected-hashes.txt) — the v3 trust boundary
    # (auditors re-render and compare hashes). Matches e2e/run-determinism.sh.
    container: mcr.microsoft.com/playwright:v1.53.0-noble
    steps:
      - uses: actions/checkout@v4
      - name: browser render == native goldens
        working-directory: e2e
        run: |
          npm install --no-audit --no-fund
          node determinism.mjs

  # NOTE: the v2-era `e2e` (full batch/community-render stack: in-browser libp2p
  # peers, generation/breeding engine, swarm page) and `connectivity` (in-browser
  # libp2p mesh) jobs were retired with the v3 rewrite — browsers are now thin
  # HTTP clients to a sheep-node, so those suites tested removed behavior and were
  # permanently red. Native swarm/engine coverage lives in `cargo test -p
  # sheep-node` (run locally / pre-deploy); re-add a v3 integration job here if a
  # headless gateway+browser harness is built. See e2e/test.js (kept for history).
