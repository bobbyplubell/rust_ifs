name: Deploy site to GitHub Pages

# Publishes the static site in web/ to GitHub Pages. The app is the swarm
# client; the relay it connects to is configured in web/config.js (RELAYS).
on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true     # turn Pages on (Actions build type) if not already
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web            # serve the web/ subdir as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
