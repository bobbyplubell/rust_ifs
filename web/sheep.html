<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { max-width: none; padding: 0; overflow: hidden; }
    #stage {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; background: #000;
    }
    #stage canvas { height: min(100vh, 100vw); width: min(100vh, 100vw); }
    #hud {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap;
      padding: 10px 14px; font-size: 12px; color: #8d8da4;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
    #hud .id { color: #62627a; }
    #hud a { color: #8d8da4; margin-left: auto; }
    #hud button.on { color: #cfe; }
    /* lineage line: "<p1> + <p2> : <name>". Living/HoF parents are links in the
       accent color; perished+not-enshrined parents are dimmed plain text (their
       fullscreen can't be opened). The arrows/separators are muted. */
    #info { color: #b9b9c8; }
    #info a.parent { color: #c8b06a; text-decoration: none; margin-left: 0; }
    #info a.parent:hover { text-decoration: underline; }
    #info .parent-dead { color: #55556a; }
    #info .sep { color: #6a6a80; }
    #info .self { color: #e6e6f0; }
    #info .tag { color: #6a6a80; }
    /* per-frame tile coverage heat grid: one cell per animation frame, its
       BRIGHTNESS encodes the combined (you + swarm) tile count — dim = fuzzy /
       few tiles, bright = sharp. No numbers (the exact count is in each cell's
       hover title). The frame currently on screen gets a clear outline. */
    #tilemap {
      position: fixed; top: 10px; right: 10px;
      display: grid; grid-template-columns: repeat(8, 13px); gap: 2px;
      padding: 7px; background: rgba(0,0,0,0.55); border-radius: 6px;
    }
    #tilemap .cell {
      width: 13px; height: 13px; border-radius: 2px; background: #1c1c28;
    }
    #tilemap .cell.cur { outline: 2px solid #c8b06a; outline-offset: 1px; }
    #tilemap .cap { grid-column: 1 / -1; font-size: 9px; color: #7a7a93; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="cv" width="384" height="384"></canvas>
  </div>
  <div id="tilemap"><span class="cap">tile density · per frame</span></div>
  <div id="hud">
    <span id="info">loading…</span>
    <span id="sheep-id" class="id"></span>
    <span id="loading" class="id"></span>
    <span id="samples" class="id"></span>
    <span id="tiles" class="id"></span>
    <span id="credits" class="id"></span>
    <button id="contribute">contribute</button>
    <button id="dl">genome ↓</button>
    <a id="back" href="index.html">← flock</a>
  </div>

  <script type="module">
    // sheep.html — the community-sourced HIGH-RES ANIMATED loop (batch era).
    //
    // We accumulate ALL N_FRAMES of the sheep at BATCH_SPEC, one integer
    // histogram per frame, and play them as a requestAnimationFrame loop. Each
    // frame keeps a tonemapped ImageBitmap for cheap playback; only a small LRU
    // working set holds the raw BigUint64Array histograms (the frames currently
    // being improved). When a frame is evicted it keeps its last image and is
    // re-rendered from its batches if it's improved again.
    //
    // This page is self-contained: it spins up its own WorkerPool and its own
    // Net instance (same wiring as app.js) so it participates in the swarm —
    // contributing batches (earning votes), gossiping records, and pulling
    // verified accumulated frames — for as long as it's open.

    import { WorkerPool } from './js/pool.js';
    import { openStore } from './js/store.js';
    import { loadIdentity, sign, verify, PEER_NS } from './js/identity.js';
    import { sha256Hex, utf8 } from './js/hash.js';
    import { provenance, sheepName } from './js/names.js';
    import { computeFlock } from './js/gens.js';
    import {
      Net, BroadcastTransport, CompositeTransport, gen,
      BATCH_SPEC, BATCH_SPP, batchKey, batchSignBytes, fraudSignBytes, PROTOCOL_VERSION,
      specForGen, specCells,
    } from './js/net.js';
    import { FrameLoop } from './js/loop.js';
    import { RELAYS } from './config.js';

    const $ = (s) => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (PEER_NS !== '0') $('#back').href = `index.html?peer=${PEER_NS}`;

    // Frame count, like resolution (W/H/SS, and so HIST_CELLS), is keyed to
    // THIS sheep's spec and rebound once its record (and birth generation) is
    // known — see main(). The genesis default seeds the per-frame arrays before
    // the record loads (genesis === this sheep's spec under the single schedule).
    let N_FRAMES = BATCH_SPEC.nFrames;
    let W = BATCH_SPEC.width, H = BATCH_SPEC.height, SS = BATCH_SPEC.ss;
    let HIST_CELLS = W * SS * H * SS * 4;
    const LOOP_MS = 14_000;
    const HIST_LRU_CAP = 8;     // frames holding raw histograms (the working set)
    // Seed previews are low-res, low-sample PLACEHOLDERS: rendered fast for
    // EVERY frame so the whole loop animates within a second, then replaced in
    // place by the sharp full-res bitmaps as batches refine / arrive from the
    // swarm. Cap the long edge (the canvas scales it up on draw) and keep the
    // sample count low — real quality comes from the actual render, not these.
    const PREV_DIM = 256;
    const previewSpec = (w, h) => {
      const s = Math.min(1, PREV_DIM / Math.max(w, h));
      return { width: Math.max(1, Math.round(w * s)), height: Math.max(1, Math.round(h * s)), samples: 100_000, seed: 7 };
    };
    let PREVIEW = previewSpec(W, H);

    const pool = new WorkerPool(Number(params.get('workers')) || undefined);
    const cv = $('#cv');
    const ctx = cv.getContext('2d');

    let me, store, net, record = null, banned = new Set();

    // Build stamp this page loaded with (set once, at first successful
    // version.txt fetch below). Fixed for the life of the tab — see startVersionPoll.
    let loadedVersion = '';

    // Per-frame state. acc: raw histogram (only for the LRU working set);
    // covered: idx values merged into acc; bitmap: last tonemapped ImageBitmap
    // (cheap, always kept); preview: placeholder ImageBitmap before any batches.
    const frames = Array.from({ length: N_FRAMES }, () => ({
      acc: null, covered: new Set(), bitmap: null, preview: null,
      tonemapPending: false, repaintQueued: false,
    }));
    const histLru = []; // frame indices, most-recently-touched last

    let contributing = $('#contribute').classList.contains('on');

    // ---- helpers --------------------------------------------------------------

    function mergeHist(acc, add) {
      for (let i = 0; i < acc.length; i++) acc[i] += add[i];
    }

    function renderBatchMsg(frame, idx) {
      return {
        type: 'render-batch', genomeJson: record.genome, sheepId: id,
        frame, idx, w: W, h: H, ss: SS, spp: BATCH_SPP, nFrames: N_FRAMES,
      };
    }

    function touchHistLru(f) {
      const at = histLru.indexOf(f);
      if (at !== -1) histLru.splice(at, 1);
      histLru.push(f);
      while (histLru.length > HIST_LRU_CAP) {
        const evict = histLru.shift();
        // Drop the raw histogram; the frame keeps its last tonemapped bitmap.
        frames[evict].acc = null;
      }
    }

    // Ensure frame f's raw histogram is present: if it was evicted but we hold
    // its batches, re-render and re-sum them. Returns the acc (or null if no
    // batches yet).
    async function ensureAcc(f) {
      const fr = frames[f];
      if (fr.acc) { touchHistLru(f); return fr.acc; }
      if (!fr.covered.size) return null;
      const acc = new BigUint64Array(HIST_CELLS);
      for (const idx of fr.covered) {
        const reply = await pool.submit(renderBatchMsg(f, idx)).done;
        if (reply.type === 'batch-done') mergeHist(acc, new BigUint64Array(reply.hist));
      }
      fr.acc = acc;
      touchHistLru(f);
      return acc;
    }

    // Seed the render store with a frame's accumulation so peers can fetch it.
    // Throttled per frame (the histogram is multi-MB).
    const SEED_EVERY_MS = 5000;
    function maybeSeed(f) {
      const fr = frames[f];
      if (!fr.acc || !fr.covered.size) return;
      const now = Date.now();
      if (now - (fr.lastSeed || 0) < SEED_EVERY_MS) return;
      fr.lastSeed = now;
      const keys = [...fr.covered].map((i) => `${id}:${f}:${i}`);
      store.putRender(id, f, fr.acc.slice().buffer, keys).catch(console.error);
    }

    // Tonemap frame f's accumulation into its ImageBitmap (throttled per frame).
    async function repaint(f) {
      const fr = frames[f];
      if (!fr.acc || !fr.covered.size) return;
      maybeSeed(f);
      if (fr.tonemapPending) { fr.repaintQueued = true; return; }
      fr.tonemapPending = true;
      const m = await pool.submit({
        type: 'tonemap-int', hist: fr.acc.slice().buffer, genomeJson: record.genome,
        w: W, h: H, ss: SS,
      }).done;
      fr.tonemapPending = false;
      if (m.type === 'done') {
        const bmp = await createImageBitmap(
          new ImageData(new Uint8ClampedArray(m.rgba), m.width, m.height));
        fr.bitmap?.close?.();
        fr.bitmap = bmp;
      }
      if (fr.repaintQueued) { fr.repaintQueued = false; repaint(f); }
    }

    // Adopt a cached accumulated histogram for frame f (from store.getRender)
    // and tonemap it directly — FAR cheaper than re-rendering every batch via
    // ensureAcc. Only adopts if it covers at least as much as we already hold
    // (the cache `keys` are the exact tiles summed in). Returns true if adopted.
    async function adoptCachedRender(f) {
      const fr = frames[f];
      try {
        const cached = await store.getRender(id, f);
        if (!cached || !cached.buf) return false;
        const keys = Array.isArray(cached.keys) ? cached.keys : [];
        // Derive the covered idx set from the cache keys (`${id}:${f}:${idx}`).
        const idxs = [];
        for (const k of keys) {
          const idx = Number(String(k).split(':')[2]);
          if (Number.isInteger(idx)) idxs.push(idx);
        }
        // Adopt when the cache covers at least as many tiles as we hold AND we
        // don't already have a sharp bitmap — tonemapping the cached histogram
        // is always cheaper than re-rendering its batches. (Strictly fewer
        // tiles than we hold → skip; re-rendering yields the better frame.)
        if (idxs.length < fr.covered.size) return false;
        if (fr.bitmap && idxs.length === fr.covered.size) return false;
        const acc = new BigUint64Array(cached.buf);
        if (acc.length !== HIST_CELLS) return false;      // stale spec — ignore
        fr.acc = acc;
        fr.covered = new Set(idxs);
        touchHistLru(f);
        repaint(f); // fast: tonemap only, no per-batch re-render
        return true;
      } catch { return false; }
    }

    // Quick placeholder so the loop is never blank before a frame has batches.
    async function makePreview(f) {
      const fr = frames[f];
      // A preview is a placeholder ONLY where there's no sharp render yet: skip
      // if the frame already has a real tonemapped bitmap or an existing
      // preview. (Covered-but-not-yet-tonemapped frames still get a preview so
      // the whole loop animates immediately, before the parallel refine lands.)
      if (fr.preview || fr.bitmap) return;
      const m = await pool.submit({
        type: 'frame', genomeJson: record.genome, phase: f / N_FRAMES, ...PREVIEW,
      }).done;
      if (m.type === 'done' && !fr.bitmap) {
        fr.preview = await createImageBitmap(
          new ImageData(new Uint8ClampedArray(m.rgba), m.width, m.height));
      }
    }

    // ---- playback (decoupled from rendering) ----------------------------------
    //
    // The FrameLoop draws and cross-fades; it only ever reads the current
    // bitmap for a slot (or frame 0 / its preview as a universal fallback), so
    // the render side (tonemaps landing async, batches accumulating, community
    // renders arriving) never stutters playback.
    const loop = new FrameLoop(cv, {
      nFrames: N_FRAMES, loopMs: LOOP_MS,
      getFrame: (i) => frames[i].bitmap || frames[i].preview
        || frames[0].bitmap || frames[0].preview || null,
    });

    // ---- loading status -------------------------------------------------------
    //
    // The full forward loop ALWAYS plays: every frame draws its sharp `bitmap`
    // if it has one, else its low-res `preview` placeholder (see the loop's
    // getFrame), so the animation is smooth from the first second and each frame
    // upgrades IN PLACE as its batches refine or arrive from the swarm. No
    // boomerang, no range gating — the status line just reports how many frames
    // have sharpened past the placeholder.
    const frameReady = (f) => !!frames[f].bitmap;
    function updateLoadingStatus() {
      let ready = 0;
      for (let f = 0; f < N_FRAMES; f++) if (frameReady(f)) ready++;
      $('#loading').textContent = ready >= N_FRAMES
        ? 'frames sharp' : `sharpening ${ready}/${N_FRAMES}`;
    }
    setInterval(updateLoadingStatus, 500);

    // ---- samples/pixel readout ------------------------------------------------

    function totalSamples() {
      let n = 0;
      for (const fr of frames) n += fr.covered.size * BATCH_SPP;
      return n;
    }

    function showSamples() {
      const n = totalSamples();
      const perPx = n / (W * H * N_FRAMES); // flam3's "quality" number
      const s = n >= 1e9 ? `${(n / 1e9).toFixed(1)}B`
        : n >= 1e6 ? `${Math.round(n / 1e6)}M`
        : `${Math.round(n / 1e3)}k`;
      $('#samples').textContent = n
        ? `${s} samples · ${perPx.toFixed(1)}/px` : '';
      updateTilemap();
    }

    // Credit balance, same accounting as the flock: tiles you render this gen
    // earn fungible credits (use-it-or-lose-it). Shown here so contributing in
    // fullscreen gives the same feedback as the flock's status bar.
    async function updateCredits() {
      if (!net) return;
      try {
        const c = await net.credits(gen());
        const per = c.perCredit || 128;
        const toNext = per - (c.tiles % per);
        $('#credits').textContent = `${c.available} credits · ${toNext} tiles to next`;
      } catch { /* store not ready yet */ }
    }

    // ---- per-frame tile coverage map ------------------------------------------

    const tilemap = $('#tilemap');
    const tileCells = Array.from({ length: N_FRAMES }, () => {
      const c = document.createElement('div');
      c.className = 'cell';
      tilemap.append(c);
      return c;
    });
    // Per-frame swarm coverage: { mine, total } from the gossiped batch RECORDS
    // (which propagate independent of the heavy renders), so the map reflects
    // the whole swarm's work, not just what this peer has merged locally.
    let swarmCov = Array.from({ length: N_FRAMES }, () => ({ mine: 0, total: 0 }));
    async function refreshSwarmCov() {
      if (!store || !id) return;
      const recs = await store.batchesForSheep(id);
      const cov = Array.from({ length: N_FRAMES }, () => ({ mine: 0, total: 0 }));
      for (const b of recs) {
        if (b.frame < 0 || b.frame >= N_FRAMES || banned.has(b.contributor)) continue;
        cov[b.frame].total++;
        if (me && b.contributor === me.pubHex) cov[b.frame].mine++;
      }
      swarmCov = cov;
      updateTilemap();
    }
    function updateTilemap() {
      // Normalize per-frame density RELATIVE to the best-rendered frame so the
      // grid always spans the full colour range — a single-hue absolute ramp just
      // read as "all purple". Empty frame = near-black; then a cool→hot heat ramp
      // (violet → magenta → red → gold) as the frame sharpens. The true counts
      // live in the hover title and the #tiles readout below.
      let mineTotal = 0, swarmTotal = 0, maxF = 1;
      for (let f = 0; f < N_FRAMES; f++) if (swarmCov[f].total > maxF) maxF = swarmCov[f].total;
      for (let f = 0; f < N_FRAMES; f++) {
        const { mine, total } = swarmCov[f];
        mineTotal += mine; swarmTotal += total;
        if (total === 0) {
          tileCells[f].style.background = '#14141c';
        } else {
          const t = total / maxF;
          const hue = Math.round((262 + t * 143) % 360); // violet → magenta → red → gold
          const light = Math.round(26 + t * 36);          // 26% → 62%
          tileCells[f].style.background = `hsl(${hue} 70% ${light}%)`;
        }
        tileCells[f].title = `frame ${f}: ${total} tiles (you ${mine} · swarm ${total})`;
      }
      // Per-sheep tile totals HUD readout: your tiles vs the whole swarm's for
      // THIS sheep (summed across every frame).
      $('#tiles').textContent = swarmTotal
        ? `you ${mineTotal} · swarm ${swarmTotal} tiles` : '';
    }
    setInterval(() => refreshSwarmCov().catch(console.error), 2000);
    // Outline the frame currently on screen.
    let curCell = -1;
    setInterval(() => {
      const i = Math.floor(((performance.now() % LOOP_MS) / LOOP_MS) * N_FRAMES) % N_FRAMES;
      if (i !== curCell) {
        tileCells[curCell]?.classList.remove('cur');
        tileCells[i]?.classList.add('cur');
        curCell = i;
      }
    }, 120);

    // ---- idle contribution + community pull -----------------------------------
    //
    // Round-robin across frames: render the next free batch idx for the
    // least-covered frame, merge, re-tonemap, publish the batch record (earns a
    // vote). Also requestRender(id, frame) to pull community-accumulated frames
    // (verified through the gate) and merge them.

    function leastCoveredFrame() {
      let best = 0, bestN = Infinity;
      for (let f = 0; f < N_FRAMES; f++) {
        if (frames[f].covered.size < bestN) { bestN = frames[f].covered.size; best = f; }
      }
      return best;
    }

    function nextFreeIdx(f) {
      let i = 0;
      while (frames[f].covered.has(i)) i++;
      return i;
    }

    async function contributeBatch(f, idx) {
      const fr = frames[f];
      if (fr.covered.has(idx)) return null;
      fr.covered.add(idx); // reserve up-front
      let reply;
      try {
        reply = await pool.submit(renderBatchMsg(f, idx)).done;
      } catch (e) { fr.covered.delete(idx); throw e; }
      if (reply.type !== 'batch-done') { fr.covered.delete(idx); return null; }

      const acc = await ensureAcc(f) ?? new BigUint64Array(HIST_CELLS);
      mergeHist(acc, new BigUint64Array(reply.hist));
      fr.acc = acc;
      touchHistLru(f);
      repaint(f);

      const g = gen();
      const rec = {
        v: PROTOCOL_VERSION,
        sheepId: id, frame: f, idx, hash: reply.hash, spp: BATCH_SPP,
        count: Number(reply.count), contributor: me.pubHex, gen: g,
      };
      rec.sig = await sign(me.pair, batchSignBytes(rec));
      await net.publishBatch(rec);
      showSamples();
      updateCredits();
      return f;
    }

    // Saturate the pool when contributing so a focused render uses ALL workers,
    // not one tile at a time. contributeBatch reserves its idx synchronously
    // before its first await, so firing pool.size in a row renders distinct
    // tiles in parallel; each refills its slot on completion.
    let fsInFlight = 0;
    function pumpFullscreen() {
      if (!contributing) return;
      while (fsInFlight < pool.size) {
        fsInFlight++;
        const f = leastCoveredFrame();
        contributeBatch(f, nextFreeIdx(f))
          .catch(console.error)
          .finally(() => { fsInFlight--; if (contributing) pumpFullscreen(); });
      }
    }
    function startLoop() {
      // Saturating contribution pump (only runs while the contribute toggle is on).
      setTimeout(pumpFullscreen, 1200);
      setInterval(() => { if (contributing) pumpFullscreen(); }, 800);
      // ALWAYS pull community-accumulated frames (verified) so the loop shows
      // whatever the swarm has rendered — whether or not you contribute.
      setInterval(() => { net.requestRender(id, leastCoveredFrame()); }, 2000);
    }

    // ---- the Verification gate (same property as app.js) ----------------------

    async function verifyRender({ sheepId, frame, hist, batchKeys }) {
      if (sheepId !== id || !record) return false;
      if (!(hist instanceof BigUint64Array) || hist.length !== HIST_CELLS) return false;
      if (!Array.isArray(batchKeys) || !batchKeys.length) return false;

      const records = await store.batchesForSheep(sheepId);
      const byKey = new Map(records.map((b) => [b.key ?? batchKey(b), b]));
      const claimed = [];
      for (const k of batchKeys) {
        const b = byKey.get(k);
        if (!b || b.frame !== frame) return false;
        if (banned.has(b.contributor)) return false;
        claimed.push(b);
      }

      const totalReply = await pool.submit({
        type: 'total-count', hist: hist.slice().buffer, w: W, h: H, ss: SS,
      }).done;
      if (totalReply.type !== 'done') return false;
      let expected = 0n;
      for (const b of claimed) expected += BigInt(b.count);
      if (BigInt(totalReply.count) !== expected) return false;

      const sample = claimed.slice();
      for (let i = sample.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sample[i], sample[j]] = [sample[j], sample[i]];
      }
      for (const b of sample.slice(0, Math.min(4, sample.length))) {
        const reply = await pool.submit(renderBatchMsg(frame, b.idx)).done;
        if (reply.type !== 'batch-done') return false;
        if (Number(reply.count) !== b.count) return false; // record's count was inflated
        if (reply.hash !== b.hash) {
          const f = {
            v: PROTOCOL_VERSION,
            batchKey: b.key ?? batchKey(b), expected: reply.hash, reporter: me.pubHex,
          };
          f.sig = await sign(me.pair, fraudSignBytes(f));
          await net.publishFraud(f);
          return false;
        }
        const sub = await pool.submit({
          type: 'subtract-check', acc: hist.slice().buffer, batch: reply.hist,
          w: W, h: H, ss: SS,
        }).done;
        if (sub.type !== 'done' || !sub.ok) return false;
      }
      return true;
    }

    // A verified merged histogram for one frame arrived: adopt it if it covers
    // strictly more than we hold.
    async function onRender(sheepId, frame, hist) {
      if (sheepId !== id || frame < 0 || frame >= N_FRAMES) return;
      const fr = frames[frame];
      const merged = (await store.batchesForSheep(sheepId))
        .filter((b) => b.frame === frame).length;
      if (merged <= fr.covered.size) return;
      fr.acc = hist instanceof BigUint64Array ? hist.slice() : new BigUint64Array(hist);
      fr.covered = new Set((await store.batchesForSheep(sheepId))
        .filter((b) => b.frame === frame).map((b) => b.idx));
      touchHistLru(frame);
      repaint(frame);
      showSamples();
    }

    // A gossiped batch for this sheep: merge it into the right frame.
    async function onBatch(rec) {
      if (rec.sheepId !== id || banned.has(rec.contributor)) return;
      const fr = frames[rec.frame];
      if (!fr || fr.covered.has(rec.idx)) return;
      const reply = await pool.submit(renderBatchMsg(rec.frame, rec.idx)).done;
      if (reply.type !== 'batch-done') return;
      if (fr.covered.has(rec.idx)) return;
      const acc = await ensureAcc(rec.frame) ?? new BigUint64Array(HIST_CELLS);
      mergeHist(acc, new BigUint64Array(reply.hist));
      fr.acc = acc;
      fr.covered.add(rec.idx);
      touchHistLru(rec.frame);
      repaint(rec.frame);
      showSamples();
    }

    // ---- lineage line ---------------------------------------------------------
    //
    // A compact pedigree shown in place of the descriptive origin sentence:
    //   2 parents (bred pair): "<p1> + <p2> : <name>"
    //   1 parent (mutant):     "<parent> ↻ : <name>"   (↻ = mutation)
    //   0 parents (immigrant / genesis seed): just "<name>" (tagged).
    // Each parent name LINKS to its own fullscreen IF that parent is still
    // viewable — i.e. it's in the current LIVING flock OR enshrined in the Hall
    // of Fame. A parent that has PERISHED and isn't enshrined is rendered greyed
    // out (non-link), since its fullscreen can no longer be opened.
    async function renderLineage(rec) {
      const info = $('#info');
      info.textContent = '';
      info.title = provenance(rec).how; // origin sentence kept as hover context

      const append = (node) => info.appendChild(node);
      const text = (s, cls) => {
        const el = document.createElement('span');
        el.textContent = s;
        if (cls) el.className = cls;
        return el;
      };

      const peerQ = PEER_NS !== '0' ? `&peer=${PEER_NS}` : '';
      const parents = Array.isArray(rec.parents) ? rec.parents.filter(Boolean) : [];

      // Determine which parents are still viewable. Compute the living flock +
      // Hall-of-Fame history exactly as hall.html does (baked from the manifest,
      // breed/mutate/random wired through the worker pool), then a parent is
      // link-worthy iff it's alive or enshrined.
      let viewable = new Set();
      if (parents.length) {
        try {
          const baked = [];
          const manifest = await (await fetch('genomes/manifest.json')).json();
          for (const s of manifest.sheep) {
            const genome = await (await fetch(s.file)).text();
            const sid = (await pool.submit({ type: 'sheep-id', genomeJson: genome }).done).id;
            baked.push({ id: sid, genome, parents: null, gen: 0, baked: true, name: s.name });
          }
          const breedFn = (a, b, ch) => pool.submit({ type: 'breed', aJson: a, bJson: b, challengeHex: ch }).done;
          const mutateFn = (g, ch, r) => pool.submit({ type: 'mutate', genomeJson: g, challengeHex: ch, rate: r }).done;
          const randomFn = (seed) => pool.submit({ type: 'random-genome', seed }).done;
          const { living, history } = await computeFlock({ store, baked, breedFn, mutateFn, randomFn });
          viewable = new Set([...living.keys(), ...history.map((h) => h.record.id)]);
        } catch (e) {
          // If the flock can't be computed, fail safe: render parents greyed
          // (non-link) rather than dead links.
          console.error('lineage flock compute failed:', e);
        }
      }

      // A single parent slot: a link if viewable, else dimmed plain text.
      const parentNode = (pid) => {
        const name = sheepName(pid);
        if (viewable.has(pid)) {
          const a = document.createElement('a');
          a.className = 'parent';
          a.textContent = name;
          a.href = `sheep.html?id=${pid}${peerQ}`;
          a.title = pid;
          return a;
        }
        const span = text(name, 'parent-dead');
        span.title = `${pid} — perished, not in the Hall of Fame (can't be opened)`;
        return span;
      };

      if (parents.length >= 2) {
        append(parentNode(parents[0]));
        append(text(' + ', 'sep'));
        append(parentNode(parents[1]));
        append(text(' : ', 'sep'));
      } else if (parents.length === 1) {
        append(parentNode(parents[0]));
        append(text(' ↻ : ', 'sep')); // mutation arrow
      } else {
        const tag = rec.baked ? 'genesis ' : (rec.origin === 'immigrant' ? 'immigrant ' : '');
        if (tag) append(text(tag, 'tag'));
      }
      append(text(sheepName(rec), 'self'));
    }

    // ---- record lookup --------------------------------------------------------

    async function findRecord() {
      for (const r of await store.allSheep()) if (r.id === id) return r;
      const manifest = await (await fetch('genomes/manifest.json')).json();
      for (const s of manifest.sheep) {
        const genome = await (await fetch(s.file)).text();
        const sid = (await pool.submit({ type: 'sheep-id', genomeJson: genome }).done).id;
        if (sid === id) {
          return { id, genome, gen: 0, parents: null, origin: 'seed', name: s.name, baked: true };
        }
      }
      // Derived (born) children aren't store facts — the flock page stashes the
      // current generation's in localStorage for us.
      try {
        const derived = JSON.parse(localStorage.getItem(`sheep-derived-${PEER_NS}`) || '[]');
        for (const r of derived) if (r.id === id) return r;
      } catch { /* fall through */ }
      return null;
    }

    // ---- auto-update on new deploy --------------------------------------------
    //
    // The animated loop is a deterministic function of (wall-clock generation,
    // synced facts, AND this JS code version): a tab left open for days never
    // reloads and silently falls behind newer deploys, diverging from freshly-
    // loaded clients. Poll the build stamp and reload once when it changes.
    const VERSION_POLL_MS = 5 * 60_000; // re-check the deployed build every 5 min
    const VERSION_SETTLE_MS = 60_000;   // let the page settle before the first poll
    function startVersionPoll() {
      // loadedVersion (set at startup) is the build THIS page is running; fixed
      // for the tab's life, so after a reload it equals the freshly deployed
      // build → fetched === loaded → no further reload. Reloads once per deploy.
      setTimeout(() => setInterval(async () => {
        const loaded = loadedVersion;
        if (!loaded) return; // unknown loaded version → never reload
        const fetched = await fetch('version.txt', { cache: 'no-store' })
          .then((r) => (r.ok ? r.text() : '')).then((t) => t.trim()).catch(() => '');
        if (fetched && loaded && fetched !== loaded) {
          // Only reload a BACKGROUNDED tab — never yank a foreground session
          // mid-render during a deploy. A hidden tab reloads silently; a visible
          // one keeps its loaded version, so the loop guard still holds (it'll
          // reload the next time it's hidden, once, when fetched !== loaded).
          if (document.hidden) {
            console.log('new build ' + fetched + ' (was ' + loaded + ') — reloading hidden tab to stay in sync');
            location.reload();
          }
        }
      }, VERSION_POLL_MS), VERSION_SETTLE_MS);
    }

    // ---- boot -----------------------------------------------------------------

    async function main() {
      if (!id) { $('#info').textContent = 'no ?id= given'; return; }
      me = await loadIdentity();
      store = await openStore();
      record = await findRecord();
      if (!record) {
        $('#info').textContent =
          'sheep not found in this peer\'s store (derived children live only in the flock view)';
        return;
      }
      $('#sheep-id').textContent = id;
      // The page's primary identity is the unique id-derived name; the origin
      // sentence (provenance.how) becomes the hover tooltip of the lineage line.
      document.title = sheepName(record);
      // Compact lineage line, with links to viewable parents — see renderLineage.
      renderLineage(record).catch((e) => {
        console.error(e);
        $('#info').textContent = sheepName(record); // fall back to just the name
      });

      // Record the build this page loaded with, then poll for new deploys.
      // (The libp2p cache-bust below also captures this, but it's gated on
      // having relays; fetch it here so the auto-reload works regardless.)
      fetch('version.txt', { cache: 'no-store' })
        .then((r) => (r.ok ? r.text() : '')).then((t) => { if (t.trim() && !loadedVersion) loadedVersion = t.trim(); })
        .catch(() => {});
      startVersionPoll();

      // Bind resolution to THIS sheep's render spec (keyed to its birth gen),
      // so a future higher-res spec for new sheep renders correctly here.
      const spec = specForGen(record.gen);
      W = spec.width; H = spec.height; SS = spec.ss; N_FRAMES = spec.nFrames;
      HIST_CELLS = specCells(spec);
      PREVIEW = previewSpec(W, H);
      cv.width = W; cv.height = H;

      // Instant first paint of frame 0: the flock card's already-rendered pixels.
      try {
        const pv = localStorage.getItem(`sheep-preview-${id}`);
        if (pv) {
          localStorage.removeItem(`sheep-preview-${id}`);
          const img = new Image();
          img.onload = async () => {
            if (!frames[0].bitmap && !frames[0].covered.size) {
              frames[0].preview = await createImageBitmap(img);
            }
          };
          img.src = pv;
        }
      } catch { /* no preview: previews fill in shortly */ }

      const lookupSheep = async (sid) =>
        sid === id ? record : (await store.allSheep()).find((s) => s.id === sid);

      // Self-contained Net: same wiring as app.js so this page is a full peer.
      // Bootstrap relays MERGED with gossip-discovered ones (localStorage);
      // ?relay= replaces; ?stress takes none unless explicit. (See app.js.)
      const explicitRelay = params.get('relay');
      const discoveredRelays = (localStorage.getItem('relays') || '')
        .split(',').map((s) => s.trim()).filter(Boolean);
      const relays = explicitRelay ? [explicitRelay]
        : params.get('stress') ? []
        : [...new Set([...RELAYS, ...discoveredRelays])];
      const transport = new CompositeTransport([new BroadcastTransport()]);
      // Connect libp2p in the BACKGROUND so boot (and the contribute button)
      // never blocks on the 620 KB bundle + relay handshake.
      if (relays.length) {
        (async () => {
          try {
            // Cache-bust the bundle against the build stamp (see app.js note):
            // GitHub Pages caches the 620 KB bundle 10 min, so a fix wouldn't
            // reach a returning peer without this.
            const ver = await fetch('version.txt', { cache: 'no-store' }).then((r) => (r.ok ? r.text() : '')).then((t) => t.trim()).catch(() => '');
            if (ver && !loadedVersion) loadedVersion = ver; // capture the build this page loaded with
            const { createLibp2pTransport } = await import(`./js/vendor/libp2p.js${ver ? `?v=${ver}` : ''}`);
            const lp = await createLibp2pTransport({ relays });
            transport.add(lp);
            window.__libp2p = lp.node;
          } catch (err) { console.error('libp2p transport unavailable:', err); }
        })();
      }

      net = new Net({
        transport,
        store,
        identity: { pubHex: me.pubHex, pair: me.pair },
        sign, verify,
        checkBatchHash: (genomeJson, sheepId, frame, idx) =>
          pool.submit({
            type: 'batch-hash', genomeJson, sheepId, frame, idx,
            w: W, h: H, ss: SS, spp: BATCH_SPP, nFrames: N_FRAMES,
          }).done.then((m) => m.hash),
        checkSheepId: (genomeJson) =>
          pool.submit({ type: 'sheep-id', genomeJson }).done.then((m) => m.id),
        lookupSheep,
        verifyRender,
        onBatch: (rec) => onBatch(rec).catch(console.error),
        onRender: (sid, frame, hist) => onRender(sid, frame, hist).catch(console.error),
      });
      await net.start();
      banned = net.banned;
      updateCredits();
      setInterval(updateCredits, 3000); // keep the balance live as the gen fills

      // Make the page interactive IMMEDIATELY — the contribute toggle and the
      // playback loop must not wait on frame re-seeding (below) or the relay.
      $('#contribute').onclick = () => {
        contributing = !contributing;
        $('#contribute').classList.toggle('on', contributing);
        $('#contribute').textContent = contributing ? 'contributing ✓' : 'contribute';
        if (contributing) pumpFullscreen(); // start saturating the pool immediately
      };
      $('#dl').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([record.genome], { type: 'application/json' }));
        a.download = `${id.slice(0, 12)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };
      startLoop();
      loop.start();

      // Seed each frame from batches we already hold IN THE BACKGROUND —
      // re-rendering existing coverage can be slow; don't block interactivity.
      //
      // Three phases, all non-blocking, designed to fill the worker pool:
      //   1. ONE store scan, bucketed into the per-frame `covered` sets (was
      //      N_FRAMES scans — one per frame — of the whole batch store).
      //   2. Preview EVERY not-yet-sharp frame up front (cheap ~200k-sample
      //      jobs that run on the pool in parallel) so the full fuzzy loop
      //      animates in ~1-2 s instead of waiting on per-frame re-renders.
      //   3. Refine the covered frames CONCURRENTLY (bounded window) rather
      //      than awaiting each serially, prioritized by playback proximity so
      //      what's on screen sharpens first. Each refine prefers a cached
      //      accumulated histogram (tonemap-only) over re-rendering all batches.
      (async () => {
        // (1) Single scan → bucket by frame.
        const all = await store.batchesForSheep(id);
        const covered = []; // frames that have ≥1 batch to refine
        for (const b of all) {
          if (b.frame < 0 || b.frame >= N_FRAMES || banned.has(b.contributor)) continue;
          if (!frames[b.frame].covered.size) covered.push(b.frame);
          frames[b.frame].covered.add(b.idx);
        }
        showSamples();

        // (2) Preview EVERY frame up front — cheap low-res placeholders, nearest
        // the playhead first so the on-screen region animates immediately. The
        // full loop plays preview-or-sharp from the first second; no gating.
        const cur0 = loop.currentFrame();
        const previewOrder = Array.from({ length: N_FRAMES }, (_, f) => f).sort((a, b) => {
          const da = Math.min(Math.abs(a - cur0), N_FRAMES - Math.abs(a - cur0));
          const db = Math.min(Math.abs(b - cur0), N_FRAMES - Math.abs(b - cur0));
          return da - db;
        });
        for (const f of previewOrder) makePreview(f).catch(console.error);

        // (3) Bounded parallel refine, playback-proximity first. Order the
        // covered frames by distance from the current playhead so the visible
        // region sharpens first, but still cover them all. A small in-flight
        // window keeps the pool busy without queueing thousands of jobs.
        if (covered.length) {
          const cur = loop.currentFrame();
          const order = covered.slice().sort((a, b) => {
            const da = Math.min(Math.abs(a - cur), N_FRAMES - Math.abs(a - cur));
            const db = Math.min(Math.abs(b - cur), N_FRAMES - Math.abs(b - cur));
            return da - db;
          });
          const refine = async (f) => {
            // Prefer a cached accumulated histogram (fast tonemap-only); else
            // re-render the frame's batches. Either way `repaint` lands a sharp
            // bitmap and re-seeds the render cache for the next open.
            if (!(await adoptCachedRender(f))) {
              await ensureAcc(f).catch(() => {});
              repaint(f);
            }
          };
          const window = Math.max(2, pool.size || 4);
          let next = 0;
          const worker = async () => {
            while (next < order.length) {
              const f = order[next++];
              await refine(f);
            }
          };
          await Promise.all(Array.from({ length: window }, worker));
          showSamples();
        }
      })().catch(console.error);
    }

    main().catch((e) => { $('#info').textContent = 'error: ' + (e.message || e); console.error(e); });
  </script>
</body>
</html>
