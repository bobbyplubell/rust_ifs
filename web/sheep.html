<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { max-width: none; padding: 0; overflow: hidden; }
    #stage {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; background: #000;
    }
    #stage canvas { height: min(100vh, 100vw); width: min(100vh, 100vw); }
    #hud {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap;
      padding: 10px 14px; font-size: 12px; color: #8d8da4;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
    #hud .id { color: #62627a; }
    #hud a { color: #8d8da4; margin-left: auto; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="cv" width="512" height="512"></canvas>
    <canvas id="cvgpu" width="768" height="768" hidden></canvas>
  </div>
  <div id="hud">
    <span id="info">loading…</span>
    <span id="sheep-id" class="id"></span>
    <span id="samples" class="id"></span>
    <span id="quality">
      <button data-q="low">low</button>
      <button data-q="med">med</button>
      <button data-q="high">high</button>
      <button data-q="ultra">ultra</button>
    </span>
    <button id="spin">spin</button>
    <button id="dl">genome ↓</button>
    <a id="back" href="index.html">← flock</a>
  </div>

  <script type="module">
    import { WorkerPool } from './js/pool.js';
    import { openStore } from './js/store.js';
    import { PEER_NS } from './js/identity.js';
    import { GENESIS_GEN } from './js/net.js';
    import { sha256Hex, utf8 } from './js/hash.js';
    import { GpuFlame } from './js/gpu.js';
    import { provenance } from './js/names.js';
    import { PROOF_TIERS } from './js/net.js';

    const $ = (s) => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (PEER_NS !== '0') $('#back').href = `index.html?peer=${PEER_NS}`;

    const pool = new WorkerPool();
    const cv = $('#cv');
    const ctx = cv.getContext('2d');

    // Display-quality presets (display-only — proofs always use PROOF_SPEC).
    // One knob governs both the still and the spin. Spin budgets trade frame
    // rate for density: ultra runs ~9 fps but the motion-blur shutter spans
    // the real frame interval, so slower playback means longer blur, not jank.
    // The still is a *progressive accumulation*, not a one-shot render: one
    // persistent histogram that keeps taking fresh sample batches, so the image
    // appears fast (first batch) and keeps cleaning up the longer you watch
    // (noise ~1/sqrt(samples)) — flam3's own model. Resolution is fixed per
    // tier; quality comes from accumulated samples, not a bigger single job.
    // CPU: small chunks + throttled paint keep the UI responsive. GPU (when
    // present): large batches converge in ~a second, then it idles.
    // Resolution fixed per tier; quality comes from accumulated samples. ss=1
    // keeps each tonemap cheap (the worker re-resolves the whole histogram on
    // every paint) so refinement is visible quickly — density estimation in
    // the tone map denoises in place of supersampling.
    const PROGRESSIVE = {
      low:   { width: 512,  height: 512,  ss: 1, samplesPerChunk: 250_000, paintEvery: 2 },
      med:   { width: 768,  height: 768,  ss: 1, samplesPerChunk: 400_000, paintEvery: 3 },
      high:  { width: 1024, height: 1024, ss: 1, samplesPerChunk: 600_000, paintEvery: 3 },
      ultra: { width: 1280, height: 1280, ss: 1, samplesPerChunk: 900_000, paintEvery: 4 },
    };
    const SPIN = {
      low:   { budgetMs: 30,  maxS: 32_000_000,  startS: 6_000_000,  sizeCap: 640,  ss: 1, temporal: 4 },
      med:   { budgetMs: 38,  maxS: 64_000_000,  startS: 12_000_000, sizeCap: 768,  ss: 2, temporal: 4 },
      high:  { budgetMs: 60,  maxS: 128_000_000, startS: 24_000_000, sizeCap: 896,  ss: 2, temporal: 5 },
      ultra: { budgetMs: 110, maxS: 256_000_000, startS: 48_000_000, sizeCap: 1024, ss: 2, temporal: 6 },
    };
    const CPU_FRAME = {
      low:   { width: 256, height: 256, samples: 300_000, seed: 7 },
      med:   { width: 320, height: 320, samples: 450_000, seed: 7 },
      high:  { width: 384, height: 384, samples: 700_000, seed: 7 },
      ultra: { width: 448, height: 448, samples: 1_000_000, seed: 7 },
    };
    let quality = localStorage.getItem('sheep-quality');
    if (!PROGRESSIVE[quality]) quality = null; // null -> auto-benched in main()
    const LOOP_MS = 14_000;

    // WebGPU preview (display-only — proofs are CPU-deterministic, the GPU's
    // per-thread RNG stream is a different sample of the same attractor).
    let gpu = null;
    const gpuReady = GpuFlame.create().then((g) => {
      gpu = g;
      if (g) {
        $('#spin').textContent = 'spin (gpu)';
        $('#spin').title = 'animating on WebGPU';
      } else {
        $('#spin').title =
          'WebGPU unavailable in this browser — spin uses the slower CPU fallback';
      }
      return g;
    });

    async function findRecord() {
      // The store has everything we've seen (gossiped or our own); baked
      // gen-0 sheep come from the manifest.
      const store = await openStore();
      for (const r of await store.allSheep()) if (r.id === id) return r;
      const manifest = await (await fetch('genomes/manifest.json')).json();
      for (const s of manifest.sheep) {
        const genome = await (await fetch(s.file)).text();
        const sid = (await pool.submit({ type: 'sheep-id', genomeJson: genome }).done).id;
        if (sid === id) return { id, genome, gen: 0, parents: null, name: s.name, baked: true };
      }
      // Derived (born) children aren't store facts — the flock page stashes
      // the current generation's in localStorage for us.
      try {
        const derived = JSON.parse(localStorage.getItem(`sheep-derived-${PEER_NS}`) || '[]');
        for (const r of derived) if (r.id === id) return r;
      } catch { /* fall through */ }
      return null;
    }

    let record = null;
    let rendered = false; // a real still has painted (gate the placeholders)

    function markQuality() {
      for (const b of document.querySelectorAll('#quality button')) {
        b.disabled = b.dataset.q === quality;
      }
    }

    function showSamples(n) {
      $('#samples').textContent = !n ? ''
        : n >= 1e9 ? `${(n / 1e9).toFixed(1)}B samples`
        : n >= 1e6 ? `${Math.round(n / 1e6)}M samples`
        : `${Math.round(n / 1e3)}k samples`;
    }

    function useCanvas(which) { // 'cpu' (#cv) | 'gpu' (#cvgpu)
      $('#cv').hidden = which !== 'cpu';
      $('#cvgpu').hidden = which !== 'gpu';
    }

    function paint(m) {
      if (cv.width !== m.width) { cv.width = m.width; cv.height = m.height; }
      ctx.putImageData(new ImageData(new Uint8ClampedArray(m.rgba), m.width, m.height), 0, 0);
    }

    // ---- progressive still ---------------------------------------------------

    let stillCtl = null; // { stop, job } for the running accumulation

    function stopStill() {
      if (!stillCtl) return;
      stillCtl.stop = true;
      stillCtl.job?.cancel();
      stillCtl = null;
    }

    // The still always runs on the CPU accumulator (in a worker), so it can
    // never lag the main thread or fight the browser's compositor for the GPU.
    // The GPU is reserved for spin, where a continuous render is the point.
    function renderStill() {
      stopStill();
      showSamples(0);
      const spec = PROGRESSIVE[quality];
      const ctl = { stop: false, job: null };
      stillCtl = ctl;
      stillCpu(ctl, spec);
    }

    // Small fresh-seeded chunks accumulate into one histogram in the worker;
    // it paints a throttled tonemap every few chunks and keeps refining until
    // cancelled. Responsive (chunks yield) and unbounded in quality.
    function stillCpu(ctl, spec) {
      useCanvas('cpu');
      sha256Hex(utf8(`view|${id}`)).then((challengeHex) => {
        if (ctl.stop) return;
        ctl.job = pool.submit(
          {
            type: 'accumulate', genomeJson: record.genome, challengeHex,
            width: spec.width, height: spec.height, ss: spec.ss,
            samplesPerChunk: spec.samplesPerChunk, paintEvery: spec.paintEvery,
          },
          { onProgress: (p) => {
            if (ctl.stop || !p.rgba) return;
            paint(p); rendered = true; showSamples(p.samples);
          } },
        );
      });
    }

    let spinning = null;
    async function toggleSpin() {
      if (spinning) {
        spinning.stop = true; spinning = null;
        $('#spin').textContent = gpu ? 'spin (gpu)' : 'spin';
        renderStill(); // resume progressive refinement of the still
        return;
      }
      stopStill();
      showSamples(0);
      const s = { stop: false };
      spinning = s;
      $('#spin').textContent = 'stop';
      if (gpu) await spinGpu(s); else await spinCpu(s);
    }

    async function spinGpu(s) {
      const cvgpu = $('#cvgpu');
      try {
        // Render near the canvas's on-screen resolution (quality-capped),
        // supersampled like the still.
        const cfg = SPIN[quality];
        const px = Math.min(window.innerWidth, window.innerHeight) * (window.devicePixelRatio || 1);
        const size = Math.min(cfg.sizeCap, Math.max(384, Math.round(px / 8) * 8));
        cvgpu.width = size;
        cvgpu.height = size;
        gpu.configure(cvgpu);
        useCanvas('gpu');

        // Adaptive quality: float the sample count toward a frame-time budget
        // so weak GPUs stay smooth and strong ones get dense, clean frames.
        let samples = cfg.startS;
        const MIN_S = 3_000_000;
        let first = true;
        let dt = cfg.budgetMs;
        while (!s.stop) {
          const phase = (performance.now() % LOOP_MS) / LOOP_MS;
          const t0 = performance.now();
          await gpu.frame(record.genome, phase, {
            width: size, height: size, ss: cfg.ss, samples, keepExposure: !first,
            // Motion blur shutter = the actual frame interval, so blur length
            // always matches playback speed (flam3 temporal samples).
            shutter: Math.min(dt, 160) / LOOP_MS, temporal: cfg.temporal,
            directional: 0.4,
          });
          first = false;
          dt = performance.now() - t0;
          if (dt > cfg.budgetMs * 1.5) samples = Math.max(MIN_S, samples * 0.7);
          else if (dt < cfg.budgetMs * 0.6) samples = Math.min(cfg.maxS, samples * 1.3);
          await new Promise(requestAnimationFrame);
        }
      } catch (err) {
        // GPU died (device loss, validation): fall back to CPU for the session.
        console.warn('gpu spin failed, falling back to cpu:', err);
        gpu = null;
        useCanvas('cpu');
        if (!s.stop) await spinCpu(s);
      }
    }

    async function spinCpu(s) {
      useCanvas('cpu');
      const frameJob = () => pool.submit({
        type: 'frame', genomeJson: record.genome,
        phase: (performance.now() % LOOP_MS) / LOOP_MS, ...CPU_FRAME[quality],
        shutter: 0.012, temporal: 4, directional: 0.4, // flam3 motion blur
      }).done;
      let pending = frameJob();
      while (!s.stop) {
        const next = frameJob();
        const done = await pending;
        pending = next;
        if (s.stop) break;
        if (done.type === 'done') paint(done);
      }
    }

    // First visit: pick a default quality from measured wasm throughput
    // (one 200k-sample frame). Thresholds are rough CPU tiers.
    async function benchQuality() {
      const t0 = performance.now();
      await pool.submit({
        type: 'frame', genomeJson: record.genome, phase: 0,
        width: 192, height: 192, samples: 200_000, seed: 7,
      }).done;
      const ms = performance.now() - t0;
      const q = ms < 60 ? 'ultra' : ms < 120 ? 'high' : ms < 300 ? 'med' : 'low';
      console.log(`auto quality: ${q} (bench frame ${Math.round(ms)}ms)`);
      return q;
    }

    async function main() {
      if (!id) { $('#info').textContent = 'no ?id= given'; return; }
      record = await findRecord();
      if (!record) {
        $('#info').textContent =
          'sheep not found in this peer\'s store (derived children live only in the flock view)';
        return;
      }
      $('#sheep-id').textContent = id;
      $('#info').textContent = provenance(record).how;

      // Instant first paint: the flock card's already-rendered pixels.
      try {
        const pv = localStorage.getItem(`sheep-preview-${id}`);
        if (pv) {
          localStorage.removeItem(`sheep-preview-${id}`);
          const img = new Image();
          img.onload = () => {
            if (!rendered) {
              cv.width = img.width;
              cv.height = img.height;
              ctx.drawImage(img, 0, 0);
            }
          };
          img.src = pv;
        }
      } catch { /* no preview: black until first chunks land */ }

      // Next-fastest result: any verified summed proof histograms this peer
      // already holds (its own votes) — accumulated render at proof res.
      (async () => {
        const store = await openStore();
        const spec = PROOF_TIERS.std;
        const cells = spec.width * spec.ss * spec.height * spec.ss * 4;
        let acc = null;
        for (const v of await store.allVotes()) {
          if (v.sheepId !== id) continue;
          const buf = await store.getSum(v.key);
          if (!buf || buf.byteLength !== cells * 8) continue;
          if (!acc) acc = new Float64Array(cells);
          const inc = new Float64Array(buf);
          for (let k = 0; k < cells; k++) acc[k] += inc[k];
        }
        if (acc && !rendered) {
          const m = await pool.submit({
            type: 'tonemap-hist', hist: acc.buffer, genomeJson: record.genome,
            width: spec.width, height: spec.height, ss: spec.ss,
          }).done;
          if (m.type === 'done' && !rendered) paint(m);
        }
      })().catch(console.error);

      if (!quality) quality = await benchQuality();
      markQuality();
      for (const b of document.querySelectorAll('#quality button')) {
        b.onclick = () => {
          quality = b.dataset.q;
          localStorage.setItem('sheep-quality', quality);
          markQuality();
          if (spinning) {
            // Restart the spin with the new budgets/resolution.
            toggleSpin().catch(console.error); // stop -> resumes still
            toggleSpin().catch(console.error); // start fresh spin
          } else {
            renderStill();
          }
        };
      }
      $('#spin').onclick = () => toggleSpin().catch(console.error);
      $('#dl').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([record.genome], { type: 'application/json' }));
        a.download = `${id.slice(0, 12)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };
      renderStill();
    }

    main().catch((e) => { $('#info').textContent = 'error: ' + (e.message || e); console.error(e); });
  </script>
</body>
</html>
