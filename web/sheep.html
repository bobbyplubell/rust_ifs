<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { max-width: none; padding: 0; overflow: hidden; }
    #stage {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; background: #000;
    }
    #stage video { height: min(100vh, 100vw); width: min(100vh, 100vw); object-fit: contain; }
    #hud {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap;
      padding: 10px 14px; font-size: 12px; color: #8d8da4;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
    #hud .id { color: #62627a; }
    #hud a { color: #8d8da4; margin-left: auto; }
    #hud button.on { color: #cfe; }
    /* lineage line: "<p1> + <p2> : <name>". Living/HoF parents are links in the
       accent color; perished+not-enshrined parents are dimmed plain text. */
    #info { color: #b9b9c8; }
    #info a.parent { color: #c8b06a; text-decoration: none; margin-left: 0; }
    #info a.parent:hover { text-decoration: underline; }
    #info .parent-dead { color: #55556a; }
    #info .sep { color: #6a6a80; }
    #info .self { color: #e6e6f0; }
    #info .tag { color: #6a6a80; }
    /* per-frame tile coverage heat grid: one cell per animation frame, its
       BRIGHTNESS encodes the accepted tile count (dim = fuzzy, bright = sharp).
       Fed by frames_coverage from /api/sheep/:id when present. */
    #tilemap {
      position: fixed; top: 10px; right: 10px;
      display: grid; grid-template-columns: repeat(8, 13px); gap: 2px;
      padding: 7px; background: rgba(0,0,0,0.55); border-radius: 6px;
    }
    #tilemap.empty { display: none; }
    #tilemap .cell { width: 13px; height: 13px; border-radius: 2px; background: #1c1c28; }
    #tilemap .cap { grid-column: 1 / -1; font-size: 9px; color: #7a7a93; }
  </style>
</head>
<body>
  <div id="stage">
    <video id="cv" muted loop autoplay playsinline></video>
  </div>
  <div id="tilemap" class="empty"><span class="cap">tile density · per frame</span></div>
  <div id="hud">
    <span id="info">loading…</span>
    <span id="sheep-id" class="id"></span>
    <span id="samples" class="id"></span>
    <span id="tiles" class="id"></span>
    <!-- ONE global contribute toggle + live stats (same shared loop as the flock
         page). Contribution is global — it renders work for the whole flock, not
         just this sheep — so there is no per-sheep contribute here. -->
    <button id="contribute">contribute</button>
    <span id="contrib-stats" class="id">
      rendered: <b id="stat-rendered">0</b> ·
      accepted: <b id="stat-accepted">0</b> ·
      credits: <b id="stat-credits">0</b>
    </span>
    <span id="contrib-status" class="id">idle</span>
    <a id="back" href="index.html">← flock</a>
  </div>

  <script type="module">
    // sheep.html — fullscreen single sheep (v3 node API).
    //
    // Plays the node's MERGED LOOP VIDEO (/api/video/:id). Shows the lineage
    // line, coverage/vitality stats, an optional per-frame coverage heat grid
    // (from /api/sheep/:id frames_coverage), and the GLOBAL contribute toggle —
    // the same shared /assign → WASM pool → POST /api/msg loop the flock page
    // runs. Contribution is global: it renders work for the WHOLE flock (not
    // just this sheep), so we cache every living sheep's genome below.

    import { WorkerPool } from './js/pool.js';
    import { loadIdentity } from './js/identity.js';
    import { provenance, sheepName } from './js/names.js';
    import * as api from './js/api.js';
    import { Contributor } from './js/contribute.js';

    const $ = (s) => document.querySelector(s);
    const id = new URLSearchParams(location.search).get('id');

    let me, pool, contributor, contributing = false;
    let myCredits = 0;
    const genomeCache = new Map(); // sheepId -> { genomeJson, edge }

    // Global contribute stats (this session) — mirror app.js.
    let renderedTiles = 0, acceptedLocal = 0, confirmedTiles = -1;
    let tilesPerCredit = 0, contribError = '';

    async function main() {
      if (!id) { $('#info').textContent = 'no ?id= given'; return; }
      me = await loadIdentity();
      loadContribStats();   // restore contribute totals across reloads (shared w/ flock page)
      pool = new WorkerPool();

      $('#sheep-id').textContent = id;
      const video = $('#cv');
      video.src = api.videoUrl(id);
      video.play?.().catch(() => {});

      // Full detail: flock entry + genome + frames_coverage + alive/hall flags.
      let detail;
      try {
        detail = await api.getSheep(id);
      } catch (e) {
        $('#info').textContent = `sheep not found: ${e.message}`;
        return;
      }

      document.title = sheepName(detail);
      if (detail.video) { video.src = api.absoluteUrl(detail.video); video.play?.().catch(() => {}); }
      if (detail.genome) {
        genomeCache.set(id, { genomeJson: JSON.stringify(detail.genome), edge: detail.resolution || 384 });
      }

      await renderLineage(detail);
      renderStats(detail);
      renderCoverage(detail);

      // Contribution is global, so cache every living sheep's genome (not just
      // this one) — the shared loop renders whatever /api/assign hands out.
      cacheFlockGenomes();

      wireContribute();
    }

    // Cache all living sheep genomes so the global contribute loop can render
    // any assigned tile. Best-effort: a failure just leaves us with this sheep.
    async function cacheFlockGenomes() {
      try {
        const flock = await api.getFlock();
        for (const rec of flock.sheep || []) {
          if (rec.genome) {
            genomeCache.set(rec.id, {
              genomeJson: JSON.stringify(rec.genome),
              edge: rec.resolution || 384,
            });
          }
        }
      } catch (e) {
        console.warn('flock genome cache failed:', e.message);
      }
    }

    // ---- lineage line: "<p1> + <p2> : <name>" --------------------------------
    //
    // v2: the coordinator tells us each parent's id and whether it's still
    // viewable. We fetch the living flock + Hall of Fame and a parent links iff
    // it's alive or enshrined; a perished, non-enshrined parent is greyed out.
    async function renderLineage(rec) {
      const info = $('#info');
      info.textContent = '';
      info.title = provenance(rec).how;

      const text = (s, cls) => {
        const el = document.createElement('span');
        el.textContent = s;
        if (cls) el.className = cls;
        return el;
      };
      const append = (n) => info.appendChild(n);

      const parents = Array.isArray(rec.parents) ? rec.parents.filter(Boolean) : [];

      // Which parents are still viewable (alive in the flock OR in the Hall).
      let viewable = new Set();
      if (parents.length) {
        try {
          const [flock, hall] = await Promise.all([api.getFlock(), api.getHall()]);
          for (const s of flock.sheep || []) viewable.add(s.id);
          for (const s of hall.sheep || hall || []) if (s && s.id) viewable.add(s.id);
        } catch (e) {
          console.error('lineage flock/hall fetch failed:', e); // fail safe: grey parents
        }
      }

      const parentNode = (pid) => {
        const name = sheepName(pid);
        if (viewable.has(pid)) {
          const a = document.createElement('a');
          a.className = 'parent'; a.textContent = name;
          a.href = `sheep.html?id=${encodeURIComponent(pid)}`; a.title = pid;
          return a;
        }
        const span = text(name, 'parent-dead');
        span.title = `${pid} — perished, not in the Hall of Fame (can't be opened)`;
        return span;
      };

      if (parents.length >= 2) {
        append(parentNode(parents[0]));
        append(text(' + ', 'sep'));
        append(parentNode(parents[1]));
        append(text(' : ', 'sep'));
      } else if (parents.length === 1) {
        append(parentNode(parents[0]));
        append(text(' ↻ : ', 'sep'));
      } else {
        append(text('genesis ', 'tag'));
      }
      append(text(sheepName(rec), 'self'));
    }

    // ---- stats: density (samples) + confirmed tiles + vitality ---------------
    function renderStats(rec) {
      // Density / quality: total accumulated samples + samples-per-pixel (the
      // flam3-style quality metric), from the node accumulator (/api/sheep
      // `samples` + `samples_per_pixel`). Falls back to empty on older nodes.
      if (typeof rec.samples === 'number') {
        const spp = typeof rec.samples_per_pixel === 'number'
          ? ` · ${rec.samples_per_pixel.toFixed(1)}/px` : '';
        $('#samples').textContent = `${rec.samples.toLocaleString()} samples${spp}`;
      } else {
        $('#samples').textContent = '';
      }
      // Tiles = CONFIRMED coverage (audited + accumulated by the swarm) — the
      // SAME global metric the flock grid shows, so home and fullscreen agree.
      // (Not the gateway's local `accumulated_tiles`, which is per-node and
      // confusingly larger — that mismatch was the 1600-vs-464 discrepancy.)
      const cov = typeof rec.coverage === 'number' ? rec.coverage : 0;
      let t = `${cov.toLocaleString()} tiles`;
      if (typeof rec.vitality === 'number') t += ` · vitality ${rec.vitality.toFixed(2)}`;
      else if (rec.hall) t += ' · enshrined';
      $('#tiles').textContent = t;
    }

    // ---- per-frame coverage heat grid ----------------------------------------
    // frames_coverage:[n0,n1,...] — accepted tiles per animation frame. Cell
    // brightness encodes coverage relative to the busiest frame.
    function renderCoverage(rec) {
      const grid = $('#tilemap');
      const cov = rec.frames_coverage;
      if (!Array.isArray(cov) || !cov.length) { grid.classList.add('empty'); return; }
      grid.classList.remove('empty');
      const max = Math.max(1, ...cov);
      cov.forEach((n, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const lum = 0.08 + 0.92 * (n / max); // 0.08..1.0
        cell.style.background = `rgba(200,176,106,${lum.toFixed(3)})`;
        cell.title = `frame ${i}: ${n} tiles`;
        grid.appendChild(cell);
      });
    }

    // ---- global contribute (the same shared loop as the flock page) ----------
    function wireContribute() {
      $('#contribute').addEventListener('click', toggleContribute);
      renderContribStats();
    }

    function toggleContribute() {
      contributing = !contributing;
      if (contributing) {
        contributor = contributor || new Contributor(pool, me, api, {
          genomeFor: (sid) => genomeCache.get(sid) || null,
          onResult: onContribResult,
          onError: (e) => {
            contribError = e?.message || String(e);
            console.warn('contribute:', contribError);
            renderContribStats();
          },
        });
        contribError = '';
        contributor.start();
      } else {
        contributor?.stop();
      }
      renderContribStats();
    }

    // Parse a /api/msg reply (single object or { results:[...] }). Each item
    // carries accepted/credits and — on newer nodes — confirmed_tiles (running
    // total) + tiles_per_credit (e.g. 128). See app.js onContribResult.
    function onContribResult(reply) {
      contribError = '';
      renderedTiles += 1; // one block rendered + submitted, accepted or not
      const items = reply?.results || [reply];
      for (const it of items) {
        if (!it || typeof it !== 'object') continue;
        if (typeof it.credits === 'number') myCredits = Math.max(myCredits, it.credits);
        if (typeof it.tiles_per_credit === 'number') tilesPerCredit = it.tiles_per_credit;
        if (typeof it.confirmed_tiles === 'number') {
          confirmedTiles = Math.max(confirmedTiles, it.confirmed_tiles); // SET to max
        } else if (it.accepted === true) {
          acceptedLocal += 1; // older-node fallback
        }
      }
      saveContribStats();
      renderContribStats();
    }

    function acceptedCount() {
      return confirmedTiles >= 0 ? confirmedTiles : acceptedLocal;
    }

    // Persist/restore contribute totals across reloads, keyed by identity and
    // SHARED with the flock page (same localStorage key as app.js). The node
    // stays authoritative — replies overwrite via max.
    function contribStoreKey() { return `sheep-contrib-${me?.pubHex || 'anon'}`; }
    function loadContribStats() {
      try {
        const s = JSON.parse(localStorage.getItem(contribStoreKey()) || '{}');
        if (Number.isFinite(s.rendered)) renderedTiles = s.rendered;
        if (Number.isFinite(s.accepted)) acceptedLocal = s.accepted;
        if (Number.isFinite(s.confirmed)) confirmedTiles = s.confirmed;
        if (Number.isFinite(s.credits)) myCredits = s.credits;
        if (Number.isFinite(s.tilesPerCredit)) tilesPerCredit = s.tilesPerCredit;
      } catch { /* corrupt/absent */ }
    }
    function saveContribStats() {
      try {
        localStorage.setItem(contribStoreKey(), JSON.stringify({
          rendered: renderedTiles, accepted: acceptedLocal,
          confirmed: confirmedTiles, credits: myCredits, tilesPerCredit,
        }));
      } catch { /* private mode / quota */ }
    }

    function renderContribStats() {
      const btn = $('#contribute');
      btn.classList.toggle('on', contributing);
      btn.textContent = contributing ? 'contributing…' : 'contribute';

      $('#stat-rendered').textContent = String(renderedTiles);
      $('#stat-accepted').textContent = String(acceptedCount());

      let credits = String(myCredits);
      if (tilesPerCredit > 0 && confirmedTiles >= 0) {
        credits += ` (${confirmedTiles % tilesPerCredit}/${tilesPerCredit} to next)`;
      }
      $('#stat-credits').textContent = credits;

      const statusEl = $('#contrib-status');
      statusEl.textContent = contribError ? `error: ${contribError}`
        : contributing ? 'contributing — rendering…' : 'idle';
    }

    main().catch((err) => { console.error(err); $('#info').textContent = 'error: ' + (err?.message || err); });
  </script>
</body>
</html>
