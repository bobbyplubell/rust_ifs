<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { max-width: none; padding: 0; overflow: hidden; }
    #stage {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; background: #000;
    }
    #stage canvas { height: min(100vh, 100vw); width: min(100vh, 100vw); }
    #hud {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap;
      padding: 10px 14px; font-size: 12px; color: #8d8da4;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
    #hud .id { color: #62627a; }
    #hud a { color: #8d8da4; margin-left: auto; }
    #hud button.on { color: #cfe; }
    /* per-frame tile coverage: one square per animation frame, shaded by tile
       count (darker = fuzzier / fewer tiles), the count shown inside. */
    #tilemap {
      position: fixed; top: 10px; right: 10px;
      display: grid; grid-template-columns: repeat(8, 15px); gap: 2px;
      padding: 7px; background: rgba(0,0,0,0.55); border-radius: 6px;
    }
    #tilemap .cell {
      width: 15px; height: 15px; border-radius: 2px; background: #1c1c28;
      font-size: 8px; line-height: 15px; text-align: center; color: #aab;
    }
    #tilemap .cell.cur { outline: 1px solid #c8b06a; }
    #tilemap .cap { grid-column: 1 / -1; font-size: 9px; color: #7a7a93; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="cv" width="384" height="384"></canvas>
  </div>
  <div id="tilemap"><span class="cap">tiles / frame</span></div>
  <div id="hud">
    <span id="info">loading…</span>
    <span id="sheep-id" class="id"></span>
    <span id="samples" class="id"></span>
    <button id="contribute">contribute</button>
    <button id="dl">genome ↓</button>
    <a id="back" href="index.html">← flock</a>
  </div>

  <script type="module">
    // sheep.html — the community-sourced HIGH-RES ANIMATED loop (batch era).
    //
    // We accumulate ALL N_FRAMES of the sheep at BATCH_SPEC, one integer
    // histogram per frame, and play them as a requestAnimationFrame loop. Each
    // frame keeps a tonemapped ImageBitmap for cheap playback; only a small LRU
    // working set holds the raw BigUint64Array histograms (the frames currently
    // being improved). When a frame is evicted it keeps its last image and is
    // re-rendered from its batches if it's improved again.
    //
    // This page is self-contained: it spins up its own WorkerPool and its own
    // Net instance (same wiring as app.js) so it participates in the swarm —
    // contributing batches (earning votes), gossiping records, and pulling
    // verified accumulated frames — for as long as it's open.

    import { WorkerPool } from './js/pool.js';
    import { openStore } from './js/store.js';
    import { loadIdentity, sign, verify, PEER_NS } from './js/identity.js';
    import { sha256Hex, utf8 } from './js/hash.js';
    import { provenance } from './js/names.js';
    import {
      Net, BroadcastTransport, CompositeTransport, gen,
      BATCH_SPEC, BATCH_SPP, batchKey, batchSignBytes, fraudSignBytes, PROTOCOL_VERSION,
      specForGen, specCells,
    } from './js/net.js';
    import { FrameLoop } from './js/loop.js';
    import { RELAYS } from './config.js';

    const $ = (s) => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (PEER_NS !== '0') $('#back').href = `index.html?peer=${PEER_NS}`;

    // Frame count is fixed across render specs; resolution (W/H/SS, and so
    // HIST_CELLS) is keyed to THIS sheep's spec and rebound once its record
    // (and birth generation) is known — see main().
    const N_FRAMES = BATCH_SPEC.nFrames;
    let W = BATCH_SPEC.width, H = BATCH_SPEC.height, SS = BATCH_SPEC.ss;
    let HIST_CELLS = W * SS * H * SS * 4;
    const LOOP_MS = 14_000;
    const HIST_LRU_CAP = 8;     // frames holding raw histograms (the working set)
    let PREVIEW = { width: W, height: H, samples: 200_000, seed: 7 };

    const pool = new WorkerPool(Number(params.get('workers')) || undefined);
    const cv = $('#cv');
    const ctx = cv.getContext('2d');

    let me, store, net, record = null, banned = new Set();

    // Per-frame state. acc: raw histogram (only for the LRU working set);
    // covered: idx values merged into acc; bitmap: last tonemapped ImageBitmap
    // (cheap, always kept); preview: placeholder ImageBitmap before any batches.
    const frames = Array.from({ length: N_FRAMES }, () => ({
      acc: null, covered: new Set(), bitmap: null, preview: null,
      tonemapPending: false, repaintQueued: false,
    }));
    const histLru = []; // frame indices, most-recently-touched last

    let contributing = $('#contribute').classList.contains('on');

    // ---- helpers --------------------------------------------------------------

    function mergeHist(acc, add) {
      for (let i = 0; i < acc.length; i++) acc[i] += add[i];
    }

    function renderBatchMsg(frame, idx) {
      return {
        type: 'render-batch', genomeJson: record.genome, sheepId: id,
        frame, idx, w: W, h: H, ss: SS, spp: BATCH_SPP,
      };
    }

    function touchHistLru(f) {
      const at = histLru.indexOf(f);
      if (at !== -1) histLru.splice(at, 1);
      histLru.push(f);
      while (histLru.length > HIST_LRU_CAP) {
        const evict = histLru.shift();
        // Drop the raw histogram; the frame keeps its last tonemapped bitmap.
        frames[evict].acc = null;
      }
    }

    // Ensure frame f's raw histogram is present: if it was evicted but we hold
    // its batches, re-render and re-sum them. Returns the acc (or null if no
    // batches yet).
    async function ensureAcc(f) {
      const fr = frames[f];
      if (fr.acc) { touchHistLru(f); return fr.acc; }
      if (!fr.covered.size) return null;
      const acc = new BigUint64Array(HIST_CELLS);
      for (const idx of fr.covered) {
        const reply = await pool.submit(renderBatchMsg(f, idx)).done;
        if (reply.type === 'batch-done') mergeHist(acc, new BigUint64Array(reply.hist));
      }
      fr.acc = acc;
      touchHistLru(f);
      return acc;
    }

    // Tonemap frame f's accumulation into its ImageBitmap (throttled per frame).
    async function repaint(f) {
      const fr = frames[f];
      if (!fr.acc || !fr.covered.size) return;
      if (fr.tonemapPending) { fr.repaintQueued = true; return; }
      fr.tonemapPending = true;
      const m = await pool.submit({
        type: 'tonemap-int', hist: fr.acc.slice().buffer, genomeJson: record.genome,
        w: W, h: H, ss: SS,
      }).done;
      fr.tonemapPending = false;
      if (m.type === 'done') {
        const bmp = await createImageBitmap(
          new ImageData(new Uint8ClampedArray(m.rgba), m.width, m.height));
        fr.bitmap?.close?.();
        fr.bitmap = bmp;
      }
      if (fr.repaintQueued) { fr.repaintQueued = false; repaint(f); }
    }

    // Quick placeholder so the loop is never blank before a frame has batches.
    async function makePreview(f) {
      const fr = frames[f];
      if (fr.preview || fr.bitmap || fr.covered.size) return;
      const m = await pool.submit({
        type: 'frame', genomeJson: record.genome, phase: f / N_FRAMES, ...PREVIEW,
      }).done;
      if (m.type === 'done' && !fr.bitmap) {
        fr.preview = await createImageBitmap(
          new ImageData(new Uint8ClampedArray(m.rgba), m.width, m.height));
      }
    }

    // ---- playback (decoupled from rendering) ----------------------------------
    //
    // The FrameLoop draws and cross-fades; it only ever reads the current
    // bitmap for a slot (or frame 0 / its preview as a universal fallback), so
    // the render side (tonemaps landing async, batches accumulating, community
    // renders arriving) never stutters playback.
    const loop = new FrameLoop(cv, {
      nFrames: N_FRAMES, loopMs: LOOP_MS,
      getFrame: (i) => frames[i].bitmap || frames[i].preview
        || frames[0].bitmap || frames[0].preview || null,
    });

    // ---- samples/pixel readout ------------------------------------------------

    function totalSamples() {
      let n = 0;
      for (const fr of frames) n += fr.covered.size * BATCH_SPP;
      return n;
    }

    function showSamples() {
      const n = totalSamples();
      const perPx = n / (W * H * N_FRAMES); // flam3's "quality" number
      const s = n >= 1e9 ? `${(n / 1e9).toFixed(1)}B`
        : n >= 1e6 ? `${Math.round(n / 1e6)}M`
        : `${Math.round(n / 1e3)}k`;
      $('#samples').textContent = n
        ? `${s} samples · ${perPx.toFixed(1)}/px` : '';
      updateTilemap();
    }

    // ---- per-frame tile coverage map ------------------------------------------

    const tilemap = $('#tilemap');
    const tileCells = Array.from({ length: N_FRAMES }, () => {
      const c = document.createElement('div');
      c.className = 'cell';
      tilemap.append(c);
      return c;
    });
    function updateTilemap() {
      for (let f = 0; f < N_FRAMES; f++) {
        const k = frames[f].covered.size;
        tileCells[f].textContent = k || '';
        const t = Math.min(1, k / 24);          // saturate the shade around 24 tiles
        tileCells[f].style.background = `hsl(265 45% ${Math.round(9 + t * 38)}%)`;
        tileCells[f].title = `frame ${f}: ${k} tiles`;
      }
    }
    // Outline the frame currently on screen.
    let curCell = -1;
    setInterval(() => {
      const i = Math.floor(((performance.now() % LOOP_MS) / LOOP_MS) * N_FRAMES) % N_FRAMES;
      if (i !== curCell) {
        tileCells[curCell]?.classList.remove('cur');
        tileCells[i]?.classList.add('cur');
        curCell = i;
      }
    }, 120);

    // ---- idle contribution + community pull -----------------------------------
    //
    // Round-robin across frames: render the next free batch idx for the
    // least-covered frame, merge, re-tonemap, publish the batch record (earns a
    // vote). Also requestRender(id, frame) to pull community-accumulated frames
    // (verified through the gate) and merge them.

    function leastCoveredFrame() {
      let best = 0, bestN = Infinity;
      for (let f = 0; f < N_FRAMES; f++) {
        if (frames[f].covered.size < bestN) { bestN = frames[f].covered.size; best = f; }
      }
      return best;
    }

    function nextFreeIdx(f) {
      let i = 0;
      while (frames[f].covered.has(i)) i++;
      return i;
    }

    async function contributeBatch(f, idx) {
      const fr = frames[f];
      if (fr.covered.has(idx)) return null;
      fr.covered.add(idx); // reserve up-front
      let reply;
      try {
        reply = await pool.submit(renderBatchMsg(f, idx)).done;
      } catch (e) { fr.covered.delete(idx); throw e; }
      if (reply.type !== 'batch-done') { fr.covered.delete(idx); return null; }

      const acc = await ensureAcc(f) ?? new BigUint64Array(HIST_CELLS);
      mergeHist(acc, new BigUint64Array(reply.hist));
      fr.acc = acc;
      touchHistLru(f);
      repaint(f);

      const g = gen();
      const rec = {
        v: PROTOCOL_VERSION,
        sheepId: id, frame: f, idx, hash: reply.hash, spp: BATCH_SPP,
        contributor: me.pubHex, gen: g,
      };
      rec.sig = await sign(me.pair, batchSignBytes(rec));
      await net.publishBatch(rec);
      showSamples();
      return f;
    }

    let pullCursor = 0;
    function startLoop() {
      const step = async () => {
        // ALWAYS pull community-accumulated frames (verified) so the loop shows
        // whatever the swarm has rendered — whether or not you contribute.
        if ((pullCursor = (pullCursor + 1) % 10) === 0) {
          net.requestRender(id, leastCoveredFrame());
        }
        // Render + publish tiles only when the user has opted in (manual).
        if (contributing && pool.running < pool.size) {
          const f = leastCoveredFrame();
          await contributeBatch(f, nextFreeIdx(f)).catch(console.error);
        }
        setTimeout(step, 200);
      };
      setTimeout(step, 1200);
    }

    // ---- the Verification gate (same property as app.js) ----------------------

    async function verifyRender({ sheepId, frame, hist, batchKeys }) {
      if (sheepId !== id || !record) return false;
      if (!(hist instanceof BigUint64Array) || hist.length !== HIST_CELLS) return false;
      if (!Array.isArray(batchKeys) || !batchKeys.length) return false;

      const records = await store.batchesForSheep(sheepId);
      const byKey = new Map(records.map((b) => [b.key ?? batchKey(b), b]));
      const claimed = [];
      for (const k of batchKeys) {
        const b = byKey.get(k);
        if (!b || b.frame !== frame) return false;
        if (banned.has(b.contributor)) return false;
        claimed.push(b);
      }

      const totalReply = await pool.submit({
        type: 'total-count', hist: hist.slice().buffer, w: W, h: H, ss: SS,
      }).done;
      if (totalReply.type !== 'done') return false;
      let expected = 0n;
      for (const b of claimed) expected += BigInt(b.spp);
      if (BigInt(totalReply.count) !== expected) return false;

      const sample = claimed.slice();
      for (let i = sample.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sample[i], sample[j]] = [sample[j], sample[i]];
      }
      for (const b of sample.slice(0, Math.min(4, sample.length))) {
        const reply = await pool.submit(renderBatchMsg(frame, b.idx)).done;
        if (reply.type !== 'batch-done') return false;
        if (reply.hash !== b.hash) {
          const f = {
            v: PROTOCOL_VERSION,
            batchKey: b.key ?? batchKey(b), expected: reply.hash, reporter: me.pubHex,
          };
          f.sig = await sign(me.pair, fraudSignBytes(f));
          await net.publishFraud(f);
          return false;
        }
        const sub = await pool.submit({
          type: 'subtract-check', acc: hist.slice().buffer, batch: reply.hist,
          w: W, h: H, ss: SS,
        }).done;
        if (sub.type !== 'done' || !sub.ok) return false;
      }
      return true;
    }

    // A verified merged histogram for one frame arrived: adopt it if it covers
    // strictly more than we hold.
    async function onRender(sheepId, frame, hist) {
      if (sheepId !== id || frame < 0 || frame >= N_FRAMES) return;
      const fr = frames[frame];
      const merged = (await store.batchesForSheep(sheepId))
        .filter((b) => b.frame === frame).length;
      if (merged <= fr.covered.size) return;
      fr.acc = hist instanceof BigUint64Array ? hist.slice() : new BigUint64Array(hist);
      fr.covered = new Set((await store.batchesForSheep(sheepId))
        .filter((b) => b.frame === frame).map((b) => b.idx));
      touchHistLru(frame);
      repaint(frame);
      showSamples();
    }

    // A gossiped batch for this sheep: merge it into the right frame.
    async function onBatch(rec) {
      if (rec.sheepId !== id || banned.has(rec.contributor)) return;
      const fr = frames[rec.frame];
      if (!fr || fr.covered.has(rec.idx)) return;
      const reply = await pool.submit(renderBatchMsg(rec.frame, rec.idx)).done;
      if (reply.type !== 'batch-done') return;
      if (fr.covered.has(rec.idx)) return;
      const acc = await ensureAcc(rec.frame) ?? new BigUint64Array(HIST_CELLS);
      mergeHist(acc, new BigUint64Array(reply.hist));
      fr.acc = acc;
      fr.covered.add(rec.idx);
      touchHistLru(rec.frame);
      repaint(rec.frame);
      showSamples();
    }

    // ---- record lookup --------------------------------------------------------

    async function findRecord() {
      for (const r of await store.allSheep()) if (r.id === id) return r;
      const manifest = await (await fetch('genomes/manifest.json')).json();
      for (const s of manifest.sheep) {
        const genome = await (await fetch(s.file)).text();
        const sid = (await pool.submit({ type: 'sheep-id', genomeJson: genome }).done).id;
        if (sid === id) {
          return { id, genome, gen: 0, parents: null, origin: 'seed', name: s.name, baked: true };
        }
      }
      // Derived (born) children aren't store facts — the flock page stashes the
      // current generation's in localStorage for us.
      try {
        const derived = JSON.parse(localStorage.getItem(`sheep-derived-${PEER_NS}`) || '[]');
        for (const r of derived) if (r.id === id) return r;
      } catch { /* fall through */ }
      return null;
    }

    // ---- boot -----------------------------------------------------------------

    async function main() {
      if (!id) { $('#info').textContent = 'no ?id= given'; return; }
      me = await loadIdentity();
      store = await openStore();
      record = await findRecord();
      if (!record) {
        $('#info').textContent =
          'sheep not found in this peer\'s store (derived children live only in the flock view)';
        return;
      }
      $('#sheep-id').textContent = id;
      $('#info').textContent = provenance(record).how;

      // Bind resolution to THIS sheep's render spec (keyed to its birth gen),
      // so a future higher-res spec for new sheep renders correctly here.
      const spec = specForGen(record.gen);
      W = spec.width; H = spec.height; SS = spec.ss;
      HIST_CELLS = specCells(spec);
      PREVIEW = { width: W, height: H, samples: 200_000, seed: 7 };
      cv.width = W; cv.height = H;

      // Instant first paint of frame 0: the flock card's already-rendered pixels.
      try {
        const pv = localStorage.getItem(`sheep-preview-${id}`);
        if (pv) {
          localStorage.removeItem(`sheep-preview-${id}`);
          const img = new Image();
          img.onload = async () => {
            if (!frames[0].bitmap && !frames[0].covered.size) {
              frames[0].preview = await createImageBitmap(img);
            }
          };
          img.src = pv;
        }
      } catch { /* no preview: previews fill in shortly */ }

      const lookupSheep = async (sid) =>
        sid === id ? record : (await store.allSheep()).find((s) => s.id === sid);

      // Self-contained Net: same wiring as app.js so this page is a full peer.
      const relayOverride = [
        ...(params.get('relay') ? [params.get('relay')] : []),
        ...((localStorage.getItem('relays') || '').split(',').map((s) => s.trim()).filter(Boolean)),
      ];
      const relays = relayOverride.length ? relayOverride : RELAYS;
      const transports = [new BroadcastTransport()];
      if (relays.length) {
        try {
          const { createLibp2pTransport } = await import('./js/vendor/libp2p.js');
          transports.push(await createLibp2pTransport({ relays }));
        } catch (err) { console.error('libp2p transport unavailable:', err); }
      }

      net = new Net({
        transport: new CompositeTransport(transports),
        store,
        identity: { pubHex: me.pubHex, pair: me.pair },
        sign, verify,
        checkBatchHash: (genomeJson, sheepId, frame, idx) =>
          pool.submit({
            type: 'batch-hash', genomeJson, sheepId, frame, idx,
            w: W, h: H, ss: SS, spp: BATCH_SPP,
          }).done.then((m) => m.hash),
        checkSheepId: (genomeJson) =>
          pool.submit({ type: 'sheep-id', genomeJson }).done.then((m) => m.id),
        lookupSheep,
        verifyRender,
        onBatch: (rec) => onBatch(rec).catch(console.error),
        onRender: (sid, frame, hist) => onRender(sid, frame, hist).catch(console.error),
      });
      await net.start();
      banned = net.banned;

      // Seed each frame from batches we already hold, then make previews.
      for (let f = 0; f < N_FRAMES; f++) {
        const have = (await store.batchesForSheep(id)).filter((b) => b.frame === f);
        for (const b of have) frames[f].covered.add(b.idx);
      }
      // Eagerly tonemap any frames that already have coverage; preview the rest.
      for (let f = 0; f < N_FRAMES; f++) {
        if (frames[f].covered.size) { await ensureAcc(f); repaint(f); }
        else makePreview(f).catch(console.error);
      }
      showSamples();

      $('#contribute').onclick = () => {
        contributing = !contributing;
        $('#contribute').classList.toggle('on', contributing);
        $('#contribute').textContent = contributing ? 'contributing ✓' : 'contribute';
      };
      $('#dl').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([record.genome], { type: 'application/json' }));
        a.download = `${id.slice(0, 12)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      startLoop();
      loop.start();
    }

    main().catch((e) => { $('#info').textContent = 'error: ' + (e.message || e); console.error(e); });
  </script>
</body>
</html>
