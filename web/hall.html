<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hall of fame — electric sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    main { max-width: 760px; }
    .champ {
      display: flex; gap: 16px; align-items: center;
      padding: 14px 0; border-bottom: 1px solid #1c1c28;
    }
    .champ video {
      width: 128px; height: 128px; background: #000;
      border-radius: 4px; flex-shrink: 0; object-fit: cover;
    }
    .champ .info { min-width: 0; }
    .champ .gen { color: #7d7d92; font-size: 12px; letter-spacing: 0.04em; }
    .champ .name { font-size: 17px; margin: 2px 0; }
    .champ .name a { color: #c8b06a; text-decoration: none; }
    .champ .name a:hover { text-decoration: underline; }
    .champ .backing { color: #9a9ab0; font-size: 13px; }
    .crown { font-size: 18px; }
    #hall { margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>hall of fame</h1>
    <p>
      sheep that lived and perished, enshrined after death (ARCHITECTURE v3 §2.2)
      in their full community-rendered glory, ranked by peak backing.
      <a href="index.html" id="back">← back to the flock</a>
    </p>
  </header>
  <main id="hall">loading the hall…</main>

  <script type="module">
    // hall.html — Hall of Fame (v3). GET /api/hall returns enshrined dead sheep:
    // { sheep:[{ id, resolution, birth_ms, death_ms, lifespan_ms, peak_backing,
    // video }] }. We play each one's merged loop video.

    import { sheepName } from './js/names.js';
    import * as api from './js/api.js';

    const hall = document.getElementById('hall');

    function fmtAge(ms) {
      if (!ms) return '';
      const s = Math.round(ms / 1000);
      if (s < 90) return `${s}s`;
      const m = Math.round(s / 60);
      if (m < 90) return `${m}m`;
      return `${Math.round(m / 60)}h`;
    }

    try {
      const data = await api.getHall();
      const sheep = Array.isArray(data) ? data : (data.sheep || []);
      if (!sheep.length) {
        hall.textContent =
          'no champions yet — sheep are enshrined here when they perish.';
      } else {
        hall.textContent = '';
        // Most-backed first.
        const ordered = [...sheep].sort((a, b) => (b.peak_backing ?? 0) - (a.peak_backing ?? 0));
        for (const champ of ordered) {
          const row = document.createElement('div');
          row.className = 'champ';

          const video = document.createElement('video');
          video.muted = true; video.loop = true; video.autoplay = true;
          video.playsInline = true; video.setAttribute('playsinline', '');
          video.src = champ.video ? api.absoluteUrl(champ.video) : api.videoUrl(champ.id);
          video.play?.().catch(() => {});

          const info = document.createElement('div');
          info.className = 'info';
          const n = champ.peak_backing || 0;
          const life = fmtAge(champ.lifespan_ms);
          info.innerHTML =
            `<div class="gen">${champ.resolution || ''}px · lived ${life}</div>` +
            `<div class="name"><a href="sheep.html?id=${encodeURIComponent(champ.id)}" target="_blank">` +
            `${sheepName(champ)}</a> <span class="crown">👑</span></div>` +
            `<div class="backing">peak ${n} backing</div>`;

          row.append(video, info);
          hall.append(row);
        }
      }
    } catch (err) {
      hall.textContent = 'error: ' + (err?.message || err);
      console.error(err);
    }
  </script>
</body>
</html>
