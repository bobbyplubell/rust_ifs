<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>swarm — electric sheep</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    main { max-width: 900px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #1c1c28; }
    th { color: #7d7d92; font-weight: 400; font-size: 12px; }
    td.num, th.num { text-align: right; }
    .you { color: #c8b06a; }
    .dot { color: #5fae7c; }
    .banned { color: #c86a6a; }
    #totals { color: #7d7d92; }
  </style>
</head>
<body>
  <header>
    <h1>the swarm</h1>
    <p>
      every number below is derived from signed facts in this peer's store —
      no server kept score. <a href="index.html" id="back">← back to the flock</a>
    </p>
  </header>
  <main>
    <p id="totals">reading the store…</p>
    <table>
      <thead>
        <tr>
          <th>peer</th>
          <th class="num">votes</th>
          <th class="num">credits ♥</th>
          <th class="num">work proven</th>
          <th class="num">sheep released</th>
          <th class="num">alive now</th>
          <th class="num">fraud reports</th>
          <th>status</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="8">…</td></tr></tbody>
    </table>
  </main>
  <footer>
    <span id="status"></span>
    <a href="about.html">what is this?</a>
  </footer>

  <script type="module">
    import { WorkerPool } from './js/pool.js';
    import { openStore } from './js/store.js';
    import { loadIdentity, PEER_NS } from './js/identity.js';
    import { CHANNEL, BATCH_SPP, batchKey, gen, GENESIS_GEN, GEN_MS, creditsFromTiles } from './js/net.js';
    import { computeFlock } from './js/gens.js';
    import { handle } from './js/names.js';

    const $ = (s) => document.querySelector(s);
    if (PEER_NS !== '0') $('#back').href = `index.html?peer=${PEER_NS}`;

    const pool = new WorkerPool();
    const me = await loadIdentity();
    const store = await openStore();

    // Passive presence: listen to the gossip bus for inventory beacons.
    const lastSeen = new Map();
    new BroadcastChannel(CHANNEL).onmessage = (e) => {
      if (e.data?.kind === 'inv' && e.data.from) lastSeen.set(e.data.from, Date.now());
    };

    const baked = [];
    {
      const manifest = await (await fetch('genomes/manifest.json')).json();
      for (const s of manifest.sheep) {
        const genome = await (await fetch(s.file)).text();
        const id = (await pool.submit({ type: 'sheep-id', genomeJson: genome }).done).id;
        baked.push({ id, genome, parents: null, gen: 0, baked: true, name: s.name });
      }
    }
    const breedFn = (aJson, bJson, challengeHex) =>
      pool.submit({ type: 'breed', aJson, bJson, challengeHex }).done;
    const mutateFn = (genomeJson, challengeHex, rate) =>
      pool.submit({ type: 'mutate', genomeJson, challengeHex, rate }).done;
    const randomFn = (seed) =>
      pool.submit({ type: 'random-genome', seed }).done;

    const fmtWork = (samples) =>
      samples >= 1e9 ? `${(samples / 1e9).toFixed(1)}B pts`
      : samples >= 1e6 ? `${Math.round(samples / 1e6)}M pts`
      : `${Math.round(samples / 1e3)}k pts`;

    async function refresh() {
      const [batches, sheep, fraud] = await Promise.all([
        store.allBatches(), store.allSheep(), store.allFraud(),
      ]);
      // A fraud proof names a batchKey; the banned party is that batch's
      // contributor.
      const fraudKeys = new Set(fraud.map((f) => f.batchKey));
      const banned = new Set(
        batches.filter((b) => fraudKeys.has(batchKey(b))).map((b) => b.contributor));
      const { living } = await computeFlock({
        store, baked, breedFn, mutateFn, randomFn, banned,
      });

      const peers = new Map(); // pubHex -> stats
      const peer = (k) => {
        if (!peers.has(k)) {
          peers.set(k, { votes: 0, tiles: 0, work: 0, released: 0, alive: 0, reports: 0 });
        }
        return peers.get(k);
      };

      // Each verified batch a peer contributed is one vote AND BATCH_SPP of
      // shared rendering work. `tiles` is the raw tile count; vote WEIGHT is
      // credits = floor(tiles / TILES_PER_CREDIT) — the same unit gens.js backs
      // votes with — converted at display below.
      for (const b of batches) {
        const p = peer(b.contributor);
        p.votes++;
        p.work += BATCH_SPP;
        if (!banned.has(b.contributor)) p.tiles += 1;
      }
      for (const s of sheep) {
        if (!s.author) continue;
        const p = peer(s.author);
        p.released++;
        if (living.has(s.id)) p.alive++;
      }
      for (const f of fraud) peer(f.reporter).reports++;
      for (const k of lastSeen.keys()) peer(k); // online lurkers get a row
      peer(me.pubHex); // and so do you

      const rows = [...peers.entries()]
        .sort((a, b) => b[1].tiles - a[1].tiles || b[1].work - a[1].work);
      $('#rows').innerHTML = '';
      for (const [k, p] of rows) {
        const tr = document.createElement('tr');
        const online = k === me.pubHex || (Date.now() - (lastSeen.get(k) ?? 0)) < 15_000;
        const name = document.createElement('td');
        name.textContent = handle(k) + (k === me.pubHex ? ' (you)' : '');
        if (k === me.pubHex) name.className = 'you';
        name.title = k;
        tr.append(name);
        // Vote weight is CREDITS (floor(tiles / 128)), not raw tiles — the unit
        // votes are actually backed with in gens.js.
        const credits = creditsFromTiles(p.tiles);
        const cells = [
          { v: p.votes },
          { v: credits ? `${credits} ♥` : '—',
            title: `${credits} credit${credits === 1 ? '' : 's'} from ${p.tiles} tiles` },
          { v: p.work ? fmtWork(p.work) : '—' },
          { v: p.released }, { v: p.alive }, { v: p.reports },
        ];
        for (const { v, title } of cells) {
          const td = document.createElement('td');
          td.className = 'num';
          td.textContent = String(v);
          if (title) td.title = title;
          tr.append(td);
        }
        const st = document.createElement('td');
        st.innerHTML = banned.has(k)
          ? '<span class="banned">banned (fraud)</span>'
          : online ? '<span class="dot">● online</span>' : 'seen';
        tr.append(st);
        $('#rows').append(tr);
      }

      const totalWork = batches.length * BATCH_SPP;
      $('#totals').textContent =
        `generation ${gen() - GENESIS_GEN} · flock of ${living.size} · ` +
        `${batches.length} batches contributing ${fmtWork(totalWork)} of rendering · ` +
        `${sheep.filter((s) => !s.baked).length} sheep released · ` +
        `${fraud.length} frauds convicted`;
      const msLeft = GEN_MS - (Date.now() % GEN_MS);
      $('#status').textContent =
        `you are ${handle(me.pubHex)} · peer ${PEER_NS} · ` +
        `gen closes in ${Math.floor(msLeft / 60_000)}:${String(Math.floor((msLeft % 60_000) / 1000)).padStart(2, '0')}`;
    }

    await refresh();
    setInterval(() => refresh().catch(console.error), 10_000);
  </script>
</body>
</html>
