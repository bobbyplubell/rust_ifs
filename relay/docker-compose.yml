# The swarm's one server. For real deployment put TLS in front (browsers on an
# https site require wss://) — e.g. Caddy reverse-proxying a domain to :4001
# with automatic Let's Encrypt, and set ANNOUNCE to the public wss multiaddr:
#   ANNOUNCE=/dns4/relay.example.com/tcp/443/wss
services:
  relay:
    build: .
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      # ANNOUNCE: /dns4/relay.example.com/tcp/443/wss
    volumes:
      - relay-keys:/app/keys
volumes:
  relay-keys:
