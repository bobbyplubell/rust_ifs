# Production relay: the libp2p relay behind Caddy, which terminates TLS and
# reverse-proxies wss:// → the relay's plain ws. Browsers on an https site can
# only dial wss://, so this is required for a public swarm.
#
#   RELAY_DOMAIN=relay.example.com docker compose up -d --build
#
# Needs: a DNS A/AAAA record for $RELAY_DOMAIN pointing at this host, and
# ports 80+443 open (Caddy auto-provisions a Let's Encrypt cert).
services:
  relay:
    build:
      context: ..
    restart: unless-stopped
    environment:
      PORT: 4001
      # The public address the relay advertises to browsers it introduces.
      ANNOUNCE: /dns4/${RELAY_DOMAIN}/tcp/443/wss
    volumes:
      - relay-keys:/app/keys        # persist the peer id across restarts
    expose:
      - "4001"
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [relay]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
volumes:
  relay-keys:
  caddy-data:
  caddy-config:
