# Same as docker-compose.yml but runs a PRE-BUILT image instead of building from
# source — for tiny droplets (≤512 MB) that can't compile Rust. The image is
# built by GitHub Actions (.github/workflows/coordinator-image.yml) on native
# amd64 runners and published to GHCR; the droplet just pulls it:
#   docker pull ghcr.io/<owner>/sheep-coordinator:latest
#   WORLD_DOMAIN=… docker compose -f docker-compose.prebuilt.yml --env-file <world>.env up -d
# (Set IMAGE in the env / .env to pin a specific :<sha> tag if you like.)
services:
  coordinator:
    image: "${IMAGE:-ghcr.io/bobbyplubell/sheep-coordinator:latest}"
    restart: always
    environment:
      BIND: "0.0.0.0:8080"
      DATA_DIR: "/data"
      GENOMES_DIR: "/app/web/genomes"
      RUST_LOG: "${RUST_LOG:-coordinator=info}"
      GEN_MS: "${GEN_MS:-86400000}"
      GA_MUTATION_RATE: "${GA_MUTATION_RATE:-0.15}"
      GA_MUTATION_MAGNITUDE: "${GA_MUTATION_MAGNITUDE:-1}"
      GA_IMMIGRANTS: "${GA_IMMIGRANTS:-2}"
      GA_SURVIVORS: "${GA_SURVIVORS:-3}"
      GA_FLOCK_SIZE: "${GA_FLOCK_SIZE:-8}"
    volumes:
      - coordinator-data:/data
    expose:
      - "8080"
  caddy:
    image: caddy:2
    restart: always
    depends_on:
      - coordinator
    environment:
      WORLD_DOMAIN: "${WORLD_DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
volumes:
  coordinator-data:
  caddy-data:
  caddy-config:
