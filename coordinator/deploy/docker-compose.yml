# proof-of-sheep v2 coordinator + Caddy reverse proxy (auto-HTTPS).
#
# ONE compose file, EITHER world. The world's personality (generation length +
# GA knobs) and its domain come entirely from the env — pick a world by passing
# its env file:
#
#   WORLD_DOMAIN=sandbox.proof-of-sheep.com \
#     docker compose --env-file sandbox.env up -d --build
#   WORLD_DOMAIN=gallery.proof-of-sheep.com \
#     docker compose --env-file gallery.env up -d --build
#
# (Option A: one world per droplet, no failover. See DEPLOY.md.)
#
# Caddy terminates TLS for $WORLD_DOMAIN and proxies /api + /health to the
# coordinator. The API is plain REST/HTTP (no WebSocket), so no protocol pinning
# is needed. CORS is handled in-app (the static client is a separate GitHub
# Pages origin), so Caddy just proxies.
#
# Build context is the REPO ROOT (the Dockerfile copies the whole workspace);
# `dockerfile:` is relative to that context. Run from this `deploy/` dir.

services:
  coordinator:
    build:
      context: ../..
      dockerfile: coordinator/Dockerfile
    restart: always
    environment:
      BIND: "0.0.0.0:8080"
      DATA_DIR: "/data"
      GENOMES_DIR: "/app/web/genomes"
      RUST_LOG: "${RUST_LOG:-coordinator=info,tower_http=info}"
      # --- World personality (all optional; unset = code defaults) ----------
      # Generation length (ms). Sandbox = fast, Gallery = slow.
      GEN_MS: "${GEN_MS:-86400000}"
      # GA "personality" knobs (see coordinator/src/ga_config.rs). Sandbox runs
      # these HIGH (fast/wild evolution); Gallery runs them LOW (slow/refined).
      GA_MUTATION_RATE: "${GA_MUTATION_RATE:-0.15}"
      GA_MUTATION_MAGNITUDE: "${GA_MUTATION_MAGNITUDE:-1}"
      GA_IMMIGRANTS: "${GA_IMMIGRANTS:-2}"
      GA_SURVIVORS: "${GA_SURVIVORS:-3}"
      GA_FLOCK_SIZE: "${GA_FLOCK_SIZE:-8}"
    volumes:
      - coordinator-data:/data
    # Not published directly — only Caddy reaches it on the internal network.
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: always
    depends_on:
      - coordinator
    environment:
      # The world's public hostname; Caddy auto-provisions HTTPS for it.
      WORLD_DOMAIN: "${WORLD_DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  coordinator-data:
  caddy-data:
  caddy-config:
