# P2P connectivity integration test stack. Mirrors production:
#   relay  = the one libp2p relay (relay/ image, src/relay.js)
#   swarm  = Caddy (tls internal) serving web/ over https AND upgrading wss to the
#            relay's plain ws — so headless Chromium gets a real wss link.
# Peers are launched by run.sh (each a one-shot container running peer.mjs in a
# given ROLE), not declared here, because their env (relay maddr, producer hash)
# is filled at runtime.
services:
  relay:
    build: { context: ../../relay }
    environment:
      PORT: 4001
      ANNOUNCE: /dns4/swarm/tcp/443/tls/ws
    expose: ["4001"]
  swarm:
    image: caddy:2
    depends_on: [relay]
    volumes:
      - ../../web:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    expose: ["443"]
